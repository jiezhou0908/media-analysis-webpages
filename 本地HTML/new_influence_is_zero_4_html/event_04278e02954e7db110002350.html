    <div class="chart"><canvas id="chart"></canvas></div>
    <div class="footer"><p>专业舆情分析工具</p></div>
</div>

<script>
const data = [{"name":"\u4e1c\u65b9\u7f51","count":18},{"name":"\u51b0\u57ce\u7f51","count":10},{"name":"\u641c\u72d0\u6c7d\u8f66","count":5},{"name":"\u6613\u8f66\u7f51","count":5},{"name":"\u51e4\u51f0\u6c7d\u8f66","count":4},{"name":"\u89e6\u7535\u65b0\u95fb","count":4},{"name":"\u65b0\u6d6a\u6c7d\u8f66","count":3},{"name":"\u7f51\u6613","count":2},{"name":"\u7231\u6781\u5ba2","count":2},{"name":"\u65b0\u6d6a","count":2},{"name":"\u641c\u72d0","count":2},{"name":"\u6c5f\u82cf\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u4f01\u4e1a\u8bf4","count":1},{"name":"\u5934\u6761\u524d\u77bb","count":1},{"name":"\u4e70\u8f66\u7f51","count":1},{"name":"\u7ea2\u5546\u7f51","count":1},{"name":"\u9c81\u7f51","count":1},{"name":"\u821c\u7f51","count":1},{"name":"\u795e\u5dde\u8f66\u8baf","count":1},{"name":"\u524d\u77bb\u7f51","count":1},{"name":"\u6613\u8f66-\u89c6\u9891\u793e\u533a","count":1},{"name":"\u5fae\u8def\u51b5","count":1},{"name":"\u6c7d\u8f66\u5929\u6daf","count":1},{"name":"\u6c7d\u8f66\u77e5\u8bc6\u653b\u7565","count":1},{"name":"\u4eba\u6c11\u7f51\u6d77\u5357\u7ad9","count":1},{"name":"\u5343\u9f99\u7f51","count":1},{"name":"\u51e4\u51f0\u7f51","count":1},{"name":"\u73af\u7403\u65f6\u62a5","count":1},{"name":"\u65b0\u95fb\u591c\u822a","count":1},{"name":"\u4e2d\u56fd\u9752\u5e74\u7f51","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u6d4e\u5357\u65e5\u62a5","count":1},{"name":"\u9f50\u9c81\u7f51","count":1},{"name":"\u90fd\u5e02\u5168\u63a5\u89e6","count":1},{"name":"\u65b0\u84dd\u7f51","count":1}];
const total = 81;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
