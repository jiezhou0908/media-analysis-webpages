function refresh(topN=20){

    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }

    chart = new Chart(ctx,{

        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',

                // ✅ 每个柱子用不同颜色

                            m.data.forEach((b,j)=>{

                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);

                            });
                        });
                    }
                });
            }
        }]
    });
