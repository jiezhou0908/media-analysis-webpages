const data = [{"name":"\u7f51\u6613","count":8},{"name":"\u817e\u8baf\u7f51","count":5},{"name":"ZAKER\u8d44\u8baf","count":4},{"name":"\u65b0\u6d6a","count":4},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u641c\u72d0\u7f51","count":3},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":3},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":3},{"name":"\u5dee\u8bc4","count":3},{"name":"\u89c2\u5bdf\u8005\u7f51","count":3},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":3},{"name":"\u624b\u673a\u51e4\u51f0\u7f51","count":2},{"name":"\u780d\u67f4\u7f51","count":2},{"name":"\u6cf0\u4f2f\u7f51","count":2},{"name":"\u51e4\u51f0\u7f51","count":2},{"name":"\u7f51\u6613\u65b0\u95fb","count":2},{"name":"\u548c\u8baf\u7f51","count":2},{"name":"\u65b0\u90fd\u9999\u57ce\u70ed\u7ebf","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u5373\u65f6","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u53e9\u5bcc\u7f51","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u521b\u5934\u6761","count":1},{"name":"\u89c2\u5bdf\u8005APP","count":1},{"name":"\u626c\u5b50\u665a\u62a5\u7f51","count":1},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":1},{"name":"IT\u5546\u4e1a\u7f51","count":1},{"name":"\u7535\u5546\u62a5","count":1},{"name":"\u80a1\u57ce\u7f51","count":1},{"name":"\u4e2d\u8d22\u7f51","count":1},{"name":"\u56fd\u9645\u91d1\u878d\u62a5\u7f51","count":1},{"name":"\u4e2d\u56fd\u8d22\u7ecf\u4fe1\u606f\u7f51","count":1},{"name":"\u76ae\u76ae\u81ea\u5a92\u4f53","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u5929\u6781\u7f51","count":1},{"name":"\u9f9a\u const total = 90;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
