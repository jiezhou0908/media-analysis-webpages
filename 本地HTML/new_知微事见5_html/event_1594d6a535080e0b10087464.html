const data = [{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u5e7d\u9ed8\u5927\u7206\u70b8","count":4},{"name":"DoNews","count":2},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":2},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"\u65b0\u4eac\u62a5","count":2},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u9ec4\u6cb3\u7efc\u5408","count":1},{"name":"\u8df3\u52a8\u751f\u7269\u5e2e","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u56db\u5ddd\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u4eba\u4eba\u90fd\u662f\u4ea7\u54c1\u7ecf\u7406","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u548c\u8baf\u65b0\u95fb","count":1},{"name":"\u9ed1\u732b\u6295\u8bc9","count":1},{"name":"\u65b0\u9ec4\u6cb3\u5ba2\u6237\u7aef","count":1},{"name":"\u5a92\u4f53\u6eda\u52a8","count":1},{"name":"IB\u8d44\u8baf","count":1},{"name":"\u4e2d\u56fd\u80fd\u6e90\u7f51","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u6df1\u5733\u90fd\u5e02\u7f51","count":1},{"name":"\u8fde\u7ebf\u5bb6","count":1},{"name":"\u65b0\u9ec4\u6cb3","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf\u5934\u6761","count":1},{"name":"\u7ea2\u661f\u65b0\u95fb","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u661f\u5ea7\u604b\u60f3\u66f2","count":1},{"name":"\u65f6\u5c1a\u7ecf\u5178\u535a\u89c8V","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u5317\u4eac\u53ef\u513f","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u6768\u5efa\u56fd","count":1},{"name":"\u6210\u90fd\u5546\u62a5","count":1},{"name":"\u65b0\u5468\u520a","count":1},{"name":"\u5927\u6811\u81ea\u5a92\u4f53","count":1},{"name":"\u65b0\u8baf\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u8001\u864e\u793e\u533a","count":1},{"name":"\u5fae\u535a const total = 53;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
