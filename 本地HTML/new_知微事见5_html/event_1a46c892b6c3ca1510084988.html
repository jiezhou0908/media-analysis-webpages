const data = [{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":8},{"name":"\u4e2d\u534e\u7f51","count":4},{"name":"\u5357\u65b9\u65e5\u62a5","count":3},{"name":"\u624b\u673a\u5fae\u535a","count":3},{"name":"\u4f01\u67e5\u67e5","count":2},{"name":"\u5965\u4e00\u7f51","count":2},{"name":"\u65b0\u95fb\u6668\u62a5","count":2},{"name":"\u53a6\u95e8\u65e5\u62a5","count":1},{"name":"\u5929\u6d25\u65e5\u62a5","count":1},{"name":"\u5b89\u5fbd\u7f51","count":1},{"name":"\u6e56\u5dde\u5728\u7ebf","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u8d8a\u725b\u65b0\u95fb","count":1},{"name":"\u7f57\u6d6e\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"0471\u623f\u4ea7\u7f51","count":1},{"name":"\u7389\u6797\u665a\u62a5","count":1},{"name":"\u8a00\u5b89\u5802","count":1},{"name":"\u6d25\u4e91\u7f51","count":1},{"name":"\u592e\u5e7f\u7f51\u5fae\u4fe1\u516c\u4f17\u53f7","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1},{"name":"\u661f\u5c9b\u73af\u7403\u7f51","count":1},{"name":"\u6676\u62a5APP","count":1},{"name":"\u623f\u5929\u4e0b","count":1},{"name":"\u73af\u7403\u7ecf\u9a8c\u7f51","count":1},{"name":"\u57ce\u4e8b\u7279\u641c","count":1},{"name":"\u5927\u7696\u65b0\u95fb","count":1},{"name":"\u5357\u56fd\u65e9\u62a5\u7f51","count":1},{"name":"\u9547\u6c5f\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6","count":1},{"name":"\u8d64\u5cf0\u65e5\u62a5","count":1},{"name":"\u65b0\u95fb\u591c\u822a","count":1},{"name":"\u534e\u5546\u62a5","count":1},{"name":"\u5b89\u5fbd\u4ea4\u901a\u5e7f\u64ad","count":1},{"name":"\u5c0f\u5f3a\u70ed\u7ebf","count":1},{"name":"19\u697c","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u9c81\u4e2d\u6668\u62a5","count":1},{"name":"\u65b0\u8baf\u7f51","count":1},{"name":"DV\u73b0\u573a","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u6d1b\u9633\u4e2d\u7f51","count":1},{"name":"\u65e5\u7167\u7f51","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"\u7ea2\u661f\u65b0\u95fb","count":1},{"name":"\u4e2d\u56fd\u80fd\u6e90\u7f51","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb\u7efc\u5408","count":1}];
const total = 63;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
