const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":4},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":3},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u4e2d\u534e\u5546\u8d38\u7f51","count":1},{"name":"\u8d22\u5bcc\u4e2d\u56fd\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u7ecf\u6d4e\u7f51","count":1},{"name":"\u6d88\u606f\u52a8\u6001","count":1},{"name":"\u8bad\u7ec3\u8425","count":1},{"name":"\u5a92\u4f53\u8bad\u7ec3\u8425","count":1},{"name":"\u4e91\u638c\u8d22\u7ecf","count":1},{"name":"\u77e5\u987fZhiDun","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u5468\u520a","count":1},{"name":"Vista\u770b\u5929\u4e0b","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u5546\u4e1a\u5c01\u9762\u62a5\u9053","count":1},{"name":"\u8d44\u8baf\u9510\u773c","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"Dalei","count":1},{"name":"\u65b0\u6c5f\u5357\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u73af\u7403\u5468\u520a\u7f51","count":1},{"name":"\u9752\u5e74\u8d22\u5bcc\u7f51","count":1},{"name":"\u521b\u4e1a\u6700\u524d\u7ebf","count":1},{"name":"\u73af\u7403\u4f20\u5a92\u7f51","count":1},{"name":"\u51e4\u51f0\u8d22\u7ecf\u5468\u520a","count":1},{"name":"\u4e09\u8054\u751f\u6d3b\u5468\u520a","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u661f\u5ea7\u604b\u60f3\u66f2","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u65b0\u95fb\u65e9\u9910","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u641c\u72d0","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u9752\u6d77\u536b\u89c6","count":1},{"name":"\u81f3\u8bda\u8d22\u7ecf","count":1},{"name":"\u7efc\u6295\u7f51","count":1},{"name":"\u4e0a\u6d77\u5546\u7f51","count":1},{"name":"\u4e2d\u7a46\u9752\u5e74\u7f51","count":1},{"name":"ZAKER","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u91d1\u878d\u4e2d\u56fd","count":1},{"name":"\u4e1c\u65b9\u65f6\u95f4\u7f51","count":1},{"name":"\u521b\u65b0\u4e2d\u56fd","count":1},{"name":"\u7267\u6653","count":1},{"name":"\u77e5\u987f","count":1}];
const total = 56;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
