const data = [{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u8054\u5546\u7f51","count":2},{"name":"\u73af\u7403\u7f51","count":2},{"name":"\u9e1f\u54e5\u7b14\u8bb0","count":2},{"name":"\u754c\u9762\u65b0\u95fb","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u534e\u590f\u89c6\u7a97\u7f51","count":1},{"name":"\u4e2d\u534e\u536b\u6d74\u7f51","count":1},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1},{"name":"\u4e2d\u56fd\u57ce\u5e02\u7f51","count":1},{"name":"\u73af\u7403\u7f51\u8d22\u7ecf","count":1},{"name":"DoNews","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u4e2d\u56fd\u7f51\u98df\u54c1","count":1},{"name":"\u8bfb\u521b\u8d22\u7ecf","count":1},{"name":"\u4e9a\u6c47\u7f51","count":1},{"name":"18183","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u98df\u7ecf\u6d4e","count":1},{"name":"\u73af\u7403\u7ecf\u9a8c\u7f51","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u4eba\u4eba\u90fd\u662f\u4ea7\u54c1\u7ecf\u7406","count":1},{"name":"\u661f\u5ea7\u7231\u60c5001","count":1},{"name":"\u65b0\u4eac\u62a5","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u65b0\u6d6a\u65b0\u624b\u5361\u4e2d\u5fc3","count":1},{"name":"\u6df1\u5733\u5546\u62a5","count":1},{"name":"\u8da3\u89e3\u5546\u4e1a","count":1},{"name":"\u4ec0\u4e48\u503c\u5f97\u4e70","count":1},{"name":"\u4e91\u638c\u8d22\u7ecf","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u4ebf\u6b27","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u591a\u7279\u624b\u6e38","count":1}];
const total = 45;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
