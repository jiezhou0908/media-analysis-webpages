const data = [{"name":"\u7f51\u6613\u65b0\u95fb","count":4},{"name":"\u8d22\u8054\u793e","count":4},{"name":"i\u9ed1\u9a6c","count":3},{"name":"\u5934\u6761\u65b0\u95fb","count":2},{"name":"\u548c\u8baf\u7f51","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u548c\u8baf","count":2},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":2},{"name":"\u4e9a\u6c47\u7f51","count":2},{"name":"\u6613\u770b\u8d44\u8baf","count":1},{"name":"\u76ca\u76df\u64cd\u76d8\u624b","count":1},{"name":"\u79d1\u6280\u730e","count":1},{"name":"\u6dd8\u80a1\u5427","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"DoNews","count":1},{"name":"\u8d22\u7ecf\u7f51\u79d1\u6280","count":1},{"name":"\u7126\u70b9\u65e5\u62a5\u7f51","count":1},{"name":"Hou12345","count":1},{"name":"ZAKER","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"ksndhhzxns","count":1},{"name":"\u53c2\u8003\u7ecf\u6d4e\u7f51","count":1},{"name":"\u63d0\u62c9\u7c73\u82cfA08","count":1},{"name":"\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":1},{"name":"\u4e2d\u539f\u7f51\u89c6\u53f0","count":1},{"name":"\u5927\u529b\u8d22\u7ecf","count":1},{"name":"\u62bd\u5c49\u65b0\u70ed\u699c","count":1},{"name":"\u9cb8\u5e73\u53f0","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"\u56fd\u9645\u91d1\u878d\u62a5\u7f51","count":1},{"name":"\u5927\u4f17\u8bc1\u5238\u7f51","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u864e\u55c5","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u5357\u65b9\u5468\u672b","count":1},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u4e8c\u4e24_\u8d62\u5bb6","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u521b\u4e1a\u90a6","count":1},{"name":"GPLP\u7280\u725b\u8d22\u7ecf","count":1},{"name":"\u4e2d\u94a2\u7f51","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u7b2c\u4e00\u5546\u4e1a\u7f51","count":1},{"name":"FP\u8d22\u901a\u793e","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u5317\u4eac\u5934\u6761","count":1}];
const total = 65;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
