const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":5},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u5929\u773c\u67e5","count":2},{"name":"\u91d1\u878d\u754c\u80a1\u7075\u901a","count":2},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u91d1\u878d\u754c\u7f51\u7ad9","count":2},{"name":"\u91d1\u878d\u754c","count":2},{"name":"DoNews","count":1},{"name":"\u73a9\u673a\u5c11\u7237","count":1},{"name":"\u5c39\u4e0d\u5ff5\u4f0a5","count":1},{"name":"IT\u4e4b\u5bb6  - \u8fdc\u6d0b","count":1},{"name":"\u4e0d\u5410\u6ce1\u6ce1\u7684\u9c7c","count":1},{"name":"\u5bb6\u7535\u6d88\u8d39\u7f51","count":1},{"name":"\u8f66\u4e3b\u6307\u5357","count":1},{"name":"\u7231\u96c6\u5fae","count":1},{"name":"\u8ffd\u9010\u4e0b\u4e00\u573a\u9ece\u660e","count":1},{"name":"\u4f70\u4f70\u5b89\u5168\u7f51","count":1},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":1},{"name":"\u79d1\u6280\u730e","count":1},{"name":"nebula","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u84dd\u79d1\u6280","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u4ec0\u4e48\u503c\u5f97\u4e70","count":1},{"name":"\u91d1JING_3","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u4e2d\u94a2\u7f51","count":1},{"name":"gsjyddg\u7a33\u5065\u6295\u8d44\u7684\u4e13\u680f","count":1},{"name":"\u7a0b\u5e8f\u733f","count":1},{"name":"\u780d\u67f4\u7f51","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u7ea2\u6b4c\u4f1a","count":1}];
const total = 43;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
