const data = [{"name":"\u7f51\u6613\u65b0\u95fb","count":4},{"name":"\u4e2d\u534e\u7f51","count":4},{"name":"\u70ed\u70b9\u5a31\u4e50","count":3},{"name":"ZAKER","count":2},{"name":"\u65b0\u5e7f\u7f51","count":2},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":2},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":2},{"name":"\u68a8\u79d1\u6280","count":1},{"name":"\u95fd\u5357\u7f51","count":1},{"name":"\u9a84\u9633\u7f51","count":1},{"name":"\u661f\u5ea7\u8fd0\u52bf\u5168\u77e5\u9053","count":1},{"name":"\u897f\u5b89\u6c7d\u8f66\u7f51","count":1},{"name":"\u5546\u4e1a\u90a3\u70b9\u4e8b\u513f","count":1},{"name":"\u96f6\u4e09\u4e03\u76f4\u9500","count":1},{"name":"\u8d22\u7ecf\u6f2b\u8c08","count":1},{"name":"\u7b2c\u4e00\u91d1\u878d\u7f51","count":1},{"name":"\u8d38\u6613\u7ecf\u6d4e\u7f51","count":1},{"name":"\u6781\u76ee\u65b0\u95fb","count":1},{"name":"\u597d\u623f\u7f51","count":1},{"name":"\u4e2d\u56fd\u6d88\u8d39\u8005\u5bfc\u8d2d\u7f51","count":1},{"name":"\u91d1\u878d\u754c","count":1},{"name":"\u5927\u4f17\u7ecf\u6d4e\u7f51","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1},{"name":"\u624b\u673a\u8d22\u7ecf\u7f51","count":1},{"name":"\u534e\u590f\u89c6\u7a97\u7f51","count":1},{"name":"\u8d22\u7ecf","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u5929\u6daf\u793e\u533a","count":1},{"name":"\u9500\u552e\u4e0e\u5e02\u573a","count":1},{"name":"\u840c\u795e\u6728\u6728","count":1},{"name":"\u6728\u6728\u804a\u6587\u5316","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u5929\u773c\u67e5","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u56db\u6708\u7f51","count":1},{"name":"\u65b0\u95fb\u6eda\u52a8","count":1},{"name":"\u7f8e\u56fd\u4e2d\u6587\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u6d1e\u5bdf\u7f51","count":1},{"name":"\u6a59\u67ff\u4e92\u52a8","count":1}];
const total = 54;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
