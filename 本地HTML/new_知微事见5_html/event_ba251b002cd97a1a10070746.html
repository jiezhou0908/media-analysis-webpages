const data = [{"name":"\u6f8e\u6e43\u65b0\u95fb","count":5},{"name":"\u4e5d\u6d3e\u65b0\u95fb","count":4},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"19\u697c","count":2},{"name":"\u79d1\u6280\u8baf","count":2},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":2},{"name":"\u8d22\u8bf4\u6d88\u8d39","count":1},{"name":"\u5173\u952e\u5e27","count":1},{"name":"\u4e0a\u89c2\u65b0\u95fb","count":1},{"name":"\u6696\u5fc3\u7684\u5988\u5988","count":1},{"name":"\u95fd\u5357\u7f51","count":1},{"name":"Elias","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u79d1\u6280\u5148\u751f","count":1},{"name":"\u6d77\u4e0a\u516b\u5366\u738b\u5b50","count":1},{"name":"\u7126\u70b9\u65e5\u62a5\u7f51","count":1},{"name":"\u4e2d\u56fd\u521b\u4e1a\u8005\u7f51","count":1},{"name":"\u5357\u56fd\u65e9\u62a5\u7f51","count":1},{"name":"FM949\u626c\u5dde\u7ecf\u6d4e\u97f3\u4e50\u5e7f\u64ad","count":1},{"name":"\u8206\u60c5","count":1},{"name":"\u6f8e\u6e43\u8d28\u91cf\u89c2","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u9ed1\u9f99\u6c5f\u4ea4\u901a\u5e7f\u64ad","count":1},{"name":"\u5e7f\u5dde\u516c\u5b89","count":1},{"name":"\u8349\u539f900","count":1},{"name":"\u5c01\u9762\u65b0\u95fb","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u5927\u6d0b\u7f51","count":1},{"name":"\u65b0\u6d6a\u5973\u6027","count":1},{"name":"\u5e73\u5b89\u5357\u7ca4","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u523a\u9aa8705007","count":1}];
const total = 46;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
