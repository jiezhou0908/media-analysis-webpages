const data = [{"name":"\u65b0\u5feb\u62a5","count":3},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":3},{"name":"\u5fae\u5929\u4e0b","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u7ea2\u661f\u65b0\u95fb\u3001\u6b63\u5728\u65b0\u95fb\u3001\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u9f50\u9c81\u665a\u62a5\u7f51","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"\u7ea2\u661f\u65b0\u95fb","count":1},{"name":"DoNews","count":1},{"name":"Miki","count":1},{"name":"IT\u4e09\u5251\u5ba2","count":1},{"name":"\u6d88\u8d39\u8005\u62a5\u9053","count":1},{"name":"\u5fae\u535a\u8d22\u7ecf-\u8d22\u9053\u5de5\u4f5c\u5ba4","count":1},{"name":"\u8d22\u7ecf\u4e09\u5251\u5ba2","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u65b0\u5feb\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5546\u4e1a\u6d88\u8d39","count":1},{"name":"\u5708\u91cc\u8fd9\u70b9\u4e8b","count":1},{"name":"\u6d77\u5ce1\u5bfc\u62a5","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"\u65b0\u95fb\u5e7f\u89d2","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u4e2d\u539f\u7f51","count":1},{"name":"\u641c\u72d0","count":1},{"name":"19\u697c","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u8001\u864e\u793e\u533a","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1}];
const total = 40;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
