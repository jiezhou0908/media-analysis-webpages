const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":7},{"name":"\u4e2d\u56fd\u7f51","count":3},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":2},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"\u65b0\u5e7f\u7f51","count":2},{"name":"\u5eca\u574a\u65b0\u95fb\u7f51","count":2},{"name":"\u6620\u8c61\u7f51","count":2},{"name":"\u5929\u773c\u67e5","count":2},{"name":"\u6d77\u5ce1\u7f51","count":1},{"name":"\u4eba\u5de5\u667a\u80fd\u5b9e\u9a8c\u5ba4","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u732a\u6252\u6252","count":1},{"name":"\u597d\u623f\u7f51","count":1},{"name":"ZAKER","count":1},{"name":"\u8d22\u7ecf\u6f2b\u8c08","count":1},{"name":"\u68a8\u79d1\u6280","count":1},{"name":"\u5ddd\u5317\u5728\u7ebf","count":1},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u77f3\u5bb6\u5e84\u4f20\u5a92\u7f51","count":1},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":1},{"name":"\u5317\u665a\u65b0\u89c6\u89c9","count":1},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":1},{"name":"\u534e\u590f\u89c6\u7a97\u7f51","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u6f8e\u6e43\u5c71\u4e1c","count":1},{"name":"\u89c1\u5733","count":1},{"name":"\u6781\u76ee\u65b0\u95fb","count":1},{"name":"\u6e56\u5dde\u5728\u7ebf","count":1},{"name":"\u5927\u8c61\u7f51","count":1},{"name":"\u592e\u5e7f\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u6df1\u5733\u65b0\u95fb\u7f51","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u897f\u5b89\u6c7d\u8f66\u7f51","count":1}];
const total = 50;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
