const data = [{"name":"\u8d22\u7ecf\u7f51","count":3},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":3},{"name":"ZAKER","count":2},{"name":"\u9f50\u9c81\u58f9\u70b9","count":2},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"0471\u623f\u4ea7\u7f51","count":2},{"name":"\u626c\u5b50\u665a\u62a5\u7f51","count":1},{"name":"\u7d2b\u725b\u65b0\u95fb","count":1},{"name":"\u534e\u590f\u70ed\u70b9\u7f51","count":1},{"name":"\u5168\u7403\u7eba\u7ec7\u7f51","count":1},{"name":"IPO\u53c2\u8003","count":1},{"name":"\u8d22\u5bcc","count":1},{"name":"\u6d77\u5ce1\u7f51","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u5403\u74dc\u6839\u672c\u505c\u4e0d\u4e0b\u6765","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u8bfb\u521b\u8d22\u7ecf","count":1},{"name":"\u4f51\u4f3dplus6","count":1},{"name":"\u8d24\u96c6\u7f51","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u95fd\u5357\u7f51","count":1},{"name":"\u548c\u8baf\u65b0\u95fb","count":1},{"name":"\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u6d59\u6c5f\u5728\u7ebf","count":1},{"name":"\u8346\u695a\u7f51","count":1},{"name":"i\u9ed1\u9a6c","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u9ed1\u732b\u6295\u8bc9","count":1},{"name":"\u4e2d\u56fd\u80fd\u6e90\u7f51","count":1},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"\u9c81\u4e2d\u6668\u62a5","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"360\u6e38\u620f\u5927\u5385","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u300a\u5c0f\u5eb7\u300b\u00b7\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":1},{"name":"\u683c\u81f3\u8fdc\u671b","count":1}];
const total = 50;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
