const data = [{"name":"i\u9ed1\u9a6c","count":4},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u65b0\u95fb\u6668\u62a5","count":2},{"name":"\u521b\u4e1a\u90a6","count":2},{"name":"\u73af\u7403\u7ecf\u9a8c\u7f51","count":2},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"A5\u521b\u4e1a\u7f51","count":1},{"name":"\u534e\u590f\u70ed\u70b9\u7f51","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u65b0\u6e56\u5357","count":1},{"name":"IB\u8d44\u8baf","count":1},{"name":"\u957f\u6c5f\u4e91\u5065\u5eb7","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u9ed1\u732b\u6295\u8bc9","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u9996\u5e2d\u6d88\u8d39\u5b98","count":1},{"name":"\u7845\u8c37\u7f51","count":1},{"name":"\u68a8\u89c6\u9891","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u4f59\u676d\u65f6\u62a5","count":1},{"name":"\u6d77\u5ce1\u7f51","count":1},{"name":"\u7b2c\u4e00\u751f\u6d3b\u7f51","count":1},{"name":"DoNews","count":1},{"name":"TechWeb","count":1},{"name":"\u6211\u7231\u516c\u5173\u7f51","count":1},{"name":"\u6210\u90fd\u53d1\u5e03","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u661f\u5ea7\u604b\u60f3\u66f2","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u65b0\u6e56\u5357 \u2022 \u8c03\u67e5","count":1},{"name":"360\u6e38\u620f\u5927\u5385","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u5929\u6c14\u9884\u62a5","count":1},{"name":"i\u9ed1\u9a6c\u00b7","count":1},{"name":"\u79d1\u6280\u730e","count":1},{"name":"\u89c2\u70b9\u5730\u4ea7\u7f51","count":1},{"name":"\u89c2\u70b9\u65b0\u5a92\u4f53","count":1},{"name":"\u91d1\u878d\u754c","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u667a\u901a\u8d22\u7ecf","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1}];
const total = 52;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
