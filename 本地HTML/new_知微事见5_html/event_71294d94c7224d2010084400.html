<script>
const data = [{"name":"\u5357\u90fd\u5468\u520a","count":6},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u5965\u4e00\u7f51","count":2},{"name":"\u6781\u76ee\u65b0\u95fb","count":2},{"name":"\u73af\u7403\u7f51","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"TechWeb","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u676d\u5dde\u7f51","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"\u7845\u8c37\u7f51","count":1},{"name":"\u6e56\u5dde\u5728\u7ebf","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u5343\u9f99\u7f51","count":1},{"name":"\u4e2d\u56fd\u9752\u5e74\u7f51","count":1},{"name":"17\u73a9\u8f66","count":1},{"name":"IB\u8d44\u8baf","count":1},{"name":"\u8f66\u5b87\u4e16\u754c","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u7f51","count":1},{"name":"Napoleon Chan","count":1},{"name":"\u4eba\u4eba\u90fd\u662f\u4ea7\u54c1\u7ecf\u7406","count":1},{"name":"CN-SEC \u4e2d\u6587\u7f51","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"0471\u623f\u4ea7\u7f51","count":1},{"name":"\u767e\u5ea6\u6709\u9a7e","count":1},{"name":"\u7f51\u7edc\u8bc4\u8f66","count":1},{"name":"\u73e0\u6c5f\u8c03\u67e5\u5de5\u4f5c\u5ba4","count":1},{"name":"\u7b2c\u4e00\u7535\u52a8\u7f51","count":1},{"name":"\u4e2d\u56fd\u80fd\u6e90\u7f51","count":1},{"name":"ZAKER","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u8346\u695a\u7f51","count":1},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":1},{"name":"\u65b0\u665a\u62a5","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u4ec0\u4e48\u503c\u5f97\u4e70","count":1},{"name":"\u6613\u8f66\u539f\u521b\u62a5\u9053\u6b66\u660a\u5929YC","count":1},{"name":"IT\u4e4b\u5bb6  - \u6c6a\u6dfc","count":1},{"name":"\u6bcf\u7ecf\u7f51","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u821c\u7f51","count":1},{"name":"\u9655\u5de5\u7f51","count":1},{"name":"\u6c7d\u8f66\u4fe1\u606f\u7f51","count":1},{"name":"\u4e70\u65b0\u8f66\u7f51","count":1},{"name":"\u6df1\u5733\u6c7d\u8f66\u7f51","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u5468\u6613","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u7231\u4f01\u67e5","count":1}];
const total = 65;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
