const data = [{"name":"i\u9ed1\u9a6c","count":2},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":2},{"name":"\u9876\u7aef\u65b0\u95fb","count":2},{"name":"0471\u623f\u4ea7\u7f51","count":2},{"name":"\u897f\u90e8\u51b3\u7b56","count":1},{"name":"\u6613\u770b\u8d44\u8baf","count":1},{"name":"\u79d1\u6280\u730e","count":1},{"name":"\u4eca\u65e5\u7126\u70b9","count":1},{"name":"\u77e5\u987f","count":1},{"name":"\u6700\u8d44\u8baf","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":1},{"name":"\u73e0\u6c5f\u8c03\u67e5\u5de5\u4f5c\u5ba4","count":1},{"name":"\u7d2b\u91d1\u8d22\u7ecf","count":1},{"name":"\u73af\u7403\u7ecf\u9a8c\u7f51","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u677e\u679c-\u8d22\u7ecf","count":1},{"name":"Foodtalks","count":1},{"name":"\u4e2d\u56fd\u91d1\u878d\u89c2\u5bdf\u7f51","count":1},{"name":"\u4e2d\u56fd\u4f01\u4e1a\u5bb6\u7f51","count":1},{"name":"\u897f\u90e8\u51b3\u7b56\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"\u4e09\u8054\u751f\u6d3b\u5468\u520a","count":1},{"name":"\u5357\u65b9\u65e5\u62a5","count":1},{"name":"\u4e2d\u5de5\u7f51","count":1},{"name":"\u4e2d\u56fd\u9752\u5e74\u62a5","count":1},{"name":"\u65b0\u95fb\u6b63\u524d\u65b9","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u5357\u65b9\u7f51","count":1},{"name":"\u5c01\u9762\u65b0\u95fb","count":1},{"name":"\u9910\u996eO2O","count":1},{"name":"\u519c\u6c11\u65e5\u62a5","count":1},{"name":"\u4e61\u6751\u65e5\u6708\u8c08","count":1},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u5a92\u4f53\u6eda\u52a8","count":1},{"name":"\u4f01\u67e5\u67e5","count":1}];
const total = 43;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
