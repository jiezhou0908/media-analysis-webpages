const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":9},{"name":"\u65b0\u6c11\u665a\u62a5","count":8},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":6},{"name":"\u4e2d\u534e\u536b\u6d74\u7f51","count":4},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":4},{"name":"\u821c\u7f51","count":2},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"\u4e2d\u56fd\u7f51","count":2},{"name":"\u90ceclub","count":2},{"name":"\u623f\u5929\u4e0b","count":2},{"name":"\u5357\u65b9+","count":1},{"name":"\u5b89\u5fbd\u7f51","count":1},{"name":"\u65b0\u6c11\u7f51","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u839e\u8baf\u7f51","count":1},{"name":"\u91d1\u878d\u754c","count":1},{"name":"\u65b0\u6c11\u665a\u62a5\u65b0\u6c11\u7f51","count":1},{"name":"\u9e7f\u8d22\u7ecf","count":1},{"name":"\u5934\u90e8\u8d22\u7ecf-\u65b0\u79d1\u6280","count":1},{"name":"\u9e7f\u79d1\u6280","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"987\u79c1\u5bb6\u8f66\u5e7f\u64ad","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u7f51","count":1},{"name":"\u6bcf\u7ecf\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u5149\u660e\u7f51","count":1},{"name":"\u6e29\u5dde\u5546\u62a5","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"DoNews","count":1}];
const total = 65;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
