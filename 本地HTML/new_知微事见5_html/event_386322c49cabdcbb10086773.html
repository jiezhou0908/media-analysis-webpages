const data = [{"name":"\u6f8e\u6e43\u65b0\u95fb","count":4},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":3},{"name":"\u5965\u4e00\u7f51","count":3},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":3},{"name":"\u65b0\u9ec4\u6cb3","count":3},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":2},{"name":"\u65b0\u534e\u7f51","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u5e7f\u4e1c\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u5929\u5929\u8d22\u7ecf116","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"star\u661f\u89c6\u9891","count":1},{"name":"\u76f4\u64ad\u5427","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u542f\u8363\u4fe1\u606f\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u661f\u5c9b\u73af\u7403\u7f51","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u7ea2\u9910\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u5b98\u5fae","count":1},{"name":"\u98df\u54c1\u4f19\u4f34\u7f51","count":1},{"name":"\u6587\u96ef","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u7231\u6d4e\u5357\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"\u821c\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u5373\u65f6","count":1},{"name":"\u65b0\u5feb\u62a5","count":1},{"name":"UC","count":1},{"name":"\u827e\u745e\u7f51","count":1},{"name":"\u8fde\u7ebf\u5bb6","count":1},{"name":"\u9ed1\u732b\u6295\u8bc9","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u65b0\u665a\u62a5","count":1},{"name":"\u68a8\u89c6\u9891","count":1}];
const total = 50;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
