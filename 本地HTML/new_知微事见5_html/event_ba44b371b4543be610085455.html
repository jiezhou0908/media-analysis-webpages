const data = [{"name":"ZAKER","count":4},{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":2},{"name":"\u8bc1\u5238\u4e4b\u661f","count":2},{"name":"0471\u623f\u4ea7\u7f51","count":2},{"name":"\u5c0f\u5947\u8da3\u6458","count":1},{"name":"\u8f66\u8d28\u7f51","count":1},{"name":"\u6d77\u8f66\u6c47","count":1},{"name":"\u780d\u4e2a\u4ef7\u8d76\u7d27\u8d76\u7d27\u53d1","count":1},{"name":"\u7ecf\u7406\u4eba\u6742\u5fd7","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u65b0\u6d6a\u6c7d\u8f66","count":1},{"name":"\u957f\u4e11\u6d3b\u5f97\u4e45","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u6d77\u8eca\u6c47","count":1},{"name":"\u7f51\u7edc\u8bc4\u8f66","count":1},{"name":"\u7535\u5b50\u53d1\u70e7\u53cb","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u76d6\u4e16\u6c7d\u8f66","count":1},{"name":"\u7ea2\u9152\u7f51","count":1},{"name":"\u4e70\u8f66\u7f51","count":1},{"name":"\u91d1\u878d\u754c","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"IT\u4e4b\u5bb6  - \u6c9b\u9716\uff08\u5b9e\u4e60\uff09","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"DoNews","count":1},{"name":"\u65b0\u8baf\u7f51","count":1},{"name":"\u5341\u5206\u751f\u6d3b\u7f51","count":1},{"name":"\u534e\u590f\u70ed\u70b9\u7f51","count":1},{"name":"\u7b2c\u4e00\u751f\u6d3b\u7f51","count":1},{"name":"\u5927\u6811\u81ea\u5a92\u4f53","count":1},{"name":"\u6c7d\u8f66\u884c\u4e1a\u5173\u6ce8","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u780d\u67f4\u7f51","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u5b63\u98ce\u6c7d\u540e","count":1}];
const total = 46;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
