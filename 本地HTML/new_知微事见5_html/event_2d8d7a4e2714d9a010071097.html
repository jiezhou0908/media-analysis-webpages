const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":6},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":4},{"name":"\u65b0\u5e7f\u7f51","count":3},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":2},{"name":"\u535a\u89c8\u9ec4\u9875","count":2},{"name":"\u4fe1\u8d62\u5929\u4e0b","count":2},{"name":"\u673a\u68b0\u8d44\u6e90\u7f51","count":2},{"name":"\u6613\u641c\u4f01\u4e1a\u4fe1\u606f\u5e93","count":2},{"name":"\u4fe1\u7f51","count":2},{"name":"\u6d77\u5ce1\u7f51","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u7ecf\u6d4e\u89c2\u5bdf\u7f51","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u897f\u5b89\u5546\u7f51","count":1},{"name":"\u770b\u897f\u90e8","count":1},{"name":"\u9f50\u9c81\u665a\u62a5\u7f51","count":1},{"name":"\u597d\u623f\u7f51","count":1},{"name":"\u590d\u79be\u65b0\u95fb","count":1},{"name":"\u62bd\u5c49\u65b0\u70ed\u699c","count":1},{"name":"5\u53f7\u7f51","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u9752\u7f51","count":1},{"name":"\u534e\u590f\u89c6\u7a97\u7f51","count":1},{"name":"\u732a\u6252\u6252","count":1},{"name":"\u5e73\u5b89\u8d22\u7ecf\u7f51","count":1},{"name":"\u624b\u673a\u4e2d\u534e\u7f51","count":1},{"name":"\u5317\u4eac\u5934\u6761","count":1},{"name":"\u897f\u5b89\u6c7d\u8f66\u7f51","count":1},{"name":"\u5317\u4eac\u9752\u5e74\u62a5","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u5e73\u5b89\u5357\u7ca4","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u4e1c\u5317\u7f51","count":1},{"name":"\u4e1c\u5317\u65b0\u95fb\u7f51","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u4eba\u5de5\u667a\u80fd\u5b9e\u9a8c\u5ba4","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u6f8e\u6e43\u8d28\u91cf\u89c2","count":1},{"name":"\u9752\u77b3\u89c6\u89d2","count":1},{"name":"\u68a8\u79d1\u6280","count":1}];
const total = 64;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
