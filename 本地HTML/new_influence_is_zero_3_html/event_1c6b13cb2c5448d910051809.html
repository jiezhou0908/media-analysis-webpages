const data = [{"name":"\u817e\u8baf\u7f51","count":11},{"name":"\u7f51\u6613","count":10},{"name":"\u7f51\u6613\u65b0\u95fb","count":5},{"name":"\u80a1\u57ce\u7f51","count":3},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":2},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":2},{"name":"LOGO\u5927\u5e08","count":2},{"name":"\u8425\u9500\u5175\u6cd5","count":2},{"name":"\u4e1c\u65b9\u4f01\u4e1a\u5bb6","count":2},{"name":"\u91d1\u878d\u754c","count":2},{"name":"\u521b\u5934\u6761","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u5e7f\u5143\u89c6\u7a97\u7f51","count":1},{"name":"\u51ef\u56fe\u65b0\u95fb\u7f51","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u4e2d\u56fd\u5e7f\u544a\u7f51","count":1},{"name":"\u6e38\u620f\u5927\u8bb2\u575b","count":1},{"name":"\u641c\u72d0\u7f51","count":1},{"name":"\u7ecf\u6d4e\u524d\u77bb\u5206\u6790","count":1},{"name":"\u6df1\u5733\u70ed\u7ebf","count":1},{"name":"\u91d1\u6295\u7f51","count":1},{"name":"\u56db\u6d77\u7f51","count":1},{"name":"\u4e0a\u6d77\u70ed\u7ebf","count":1},{"name":"\u5e73\u5b89\u8d22\u7ecf\u7f51","count":1},{"name":"\u9999\u6e2f01","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u79d1\u6280\u5feb\u62a5\u7f51","count":1},{"name":"\u524d\u77bb\u7f51","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"cnBeta","count":1},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":1},{"name":"\u949b\u5a92\u4f53","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u9177\u73a9\u5b9e\u9a8c\u5ba4","count":1},{"name":"\u521b\u610f\u94fa\u5b50","count":1},{"name":"\u80a1\u5e02\u6d88\u606f\u7f51","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"Readhub","count":1},{"name":"\u8d22\u7ecf\u94bb","count":1},{"name":"TechWeb","count":1},{"name":"\u653e\u98de\u81ea\u6211","count":1},{"name":"\u4e2d\u658 const total = 79;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
