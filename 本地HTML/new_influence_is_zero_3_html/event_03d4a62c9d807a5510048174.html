const data = [{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":7},{"name":"\u7f51\u6613\u65b0\u95fb","count":6},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":5},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":4},{"name":"\u8d22\u7ecf\u94bb","count":4},{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u65fa\u89d2\u8d44\u8baf","count":3},{"name":"\u91d1\u878d\u754c","count":2},{"name":"\u6bcf\u7ecf\u7f51","count":2},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u7f51","count":2},{"name":"\u5317\u665a\u65b0\u89c6\u89c9","count":2},{"name":"\u817e\u8baf\u7f51","count":2},{"name":"\u624b\u673a\u51e4\u51f0\u7f51","count":2},{"name":"FX168\u8d22\u7ecf\u7f51","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":2},{"name":"\u4e91\u8d22\u7ecf\u7f51","count":1},{"name":"\u5343\u9f99\u7f51","count":1},{"name":"\u5929\u773c\u67e5","count":1},{"name":"\u540c\u82b1\u987a\u8d22\u7ecf","count":1},{"name":"\u6d25\u4e91","count":1},{"name":"\u534a\u5c9b\u65b0\u95fb","count":1},{"name":"\u706b\u661f\u70ed\u70b9\u8d44\u8baf\u7ad9","count":1},{"name":"\u5df4\u4e2d\u5728\u7ebf","count":1},{"name":"3DM\u6e38\u620f\u7f51","count":1},{"name":"\u7206\u70b8\u624d\u662f\u827a\u672f\uff01","count":1},{"name":"\u6e38\u7267\u65cf","count":1},{"name":"\u70a3\u71c3\u79d1\u6280","count":1},{"name":"\u4e2d\u56fd\u7535\u5b50\u94f6\u884c\u7f51","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"\u6df1\u5733\u70ed\u7ebf","count":1},{"name":"\u5fae\u5546\u8d44\u8baf","count":1},{"name":"\u56fd\u9645\u91d1\u878d\u62a5\u7f51","count":1},{"name":"\u4e2d\u56fd\u9752\u5e74\u7f51","count":1},{"name":"\u534e\u5546\u7f51","count":1},{"name":"\u65b0\u4eac\u62a5","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"\u548c\u8baf\u9ec4\u91d1","count":1},{"name":"\u65b0\u4eac\u62a5\u7f51","count":1},{"name":"\u626c\u5b50\u665a\u62a5\u7f51","count":1},{"name":"\u7b2c\u4e00\u9ec4\u91d1\u7f51","count":1},{"name":"\u8d22\u7ecf\u4f20\u5a92\u7f51","count":1},{"name":"\u91d1\u6295\u80a1\u7968\u7f51","count":1},{"name":"\u94f6\u884c\u5bb6\u56ed\u7f51","count":1},{"name":"\u987a\u53d1\u8d22\u7ecf","count":1},{"name":"\u6800\u989c\u4e36","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb\u7f51","count":1},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":1},{"name":"\u5ddd\u5317\u5728\u7ebf\u7f51","count":1}];
const total = 84;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
