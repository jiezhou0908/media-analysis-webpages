</div>

<script>
const data = [{"name":"\u7f51\u6613\u65b0\u95fb","count":4},{"name":"\u817e\u8baf\u7f51","count":4},{"name":"\u592e\u89c6\u8d22\u7ecf","count":2},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u5c01\u9762\u65b0\u95fb","count":2},{"name":"\u4e1c\u65b9\u7f51","count":2},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":2},{"name":"\u730e\u91d1","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":2},{"name":"\u80a1\u57ce\u7f51","count":2},{"name":"\u540c\u82b1\u987a\u5708\u5b50","count":1},{"name":"\u4e94\u73af\u4ee5\u5916","count":1},{"name":"\u592e\u89c6\u7f51","count":1},{"name":"\u534e\u4e91\u7f51","count":1},{"name":"\u5927\u524d\u7aef","count":1},{"name":"\u4e2d\u7814\u7f51","count":1},{"name":"\u534e\u5947\u7f51","count":1},{"name":"\u5514\u54e9\u5934\u6761","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u5546\u4e1a\u4eba\u7269","count":1},{"name":"\u91d1\u6295\u70ed\u70b9\u7f51","count":1},{"name":"\u4e2d\u7814\u7f51\u5ba2\u6237\u7aef","count":1},{"name":"A5\u521b\u4e1a\u7f51","count":1},{"name":"\u56db\u6d77\u7f51","count":1},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":1},{"name":"\u81f3\u8bda\u8d22\u7ecf","count":1},{"name":"Tech\u661f\u7403","count":1},{"name":"\u7efc\u6295\u7f51","count":1},{"name":"\u6d31\u6d77\u7f51","count":1},{"name":"\u798f\u5dde\u65b0\u95fb\u7f51","count":1},{"name":"CNMO","count":1},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":1},{"name":"\u54c1 \u73a9","count":1},{"name":"\u4e2d\u56fd\u8d38\u6613\u65b0\u95fb\u7f51","count":1},{"name":"\u4fe1\u7f51","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":1},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":1},{"name":"\u949b\u5a92\u4f53","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"donews","count":1},{"name":"\u780d\u67f4\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb\u7f51","count":1},{ const total = 71;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
