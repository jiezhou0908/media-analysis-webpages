const data = [{"name":"\u4e0a\u6e38\u65b0\u95fb","count":3},{"name":"\u51e4\u51f0\u7f51","count":3},{"name":"\u89c2\u5bdf\u8005","count":2},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":2},{"name":"\u641c\u72d0","count":2},{"name":"\u7f8e\u98df\u5929\u4e0b\u5bb6\u5e38\u83dc","count":2},{"name":"\u65b0\u6d6a","count":2},{"name":"M\u5927\u738b\u53eb\u6211\u6765\u5de1\u5c71","count":1},{"name":"\u8c08\u8d44","count":1},{"name":"\u548c\u4fe1","count":1},{"name":"\u4e2d\u56fd\u6d88\u8d39\u8005\u62a5","count":1},{"name":"\u8054\u5546\u7f51","count":1},{"name":"\u8fd0\u8425\u5546\u4e16\u754c\u7f51","count":1},{"name":"\u4ec0\u4e48\u503c\u5f97\u4e70","count":1},{"name":"\u4e09\u4e09\u9171","count":1},{"name":"\u795e\u5410\u69fd","count":1},{"name":"\u8d85\u7f8e\u65f6\u5c1a\u793e","count":1},{"name":"\u4e0a\u6e38\u8d22\u7ecf","count":1},{"name":"\u65b0\u6d6a\u65f6\u5c1a","count":1},{"name":"\u7cbe\u54c1\u8d2d\u7269\u6307\u5357","count":1},{"name":"\u54c1\u724c\u670d\u88c5\u7f51","count":1},{"name":"\u8d62\u5546\u7f51","count":1},{"name":"\u51e4\u51f0\u5a31\u4e50","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u5317\u4eac\u5546\u62a5","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u548c\u8baf","count":1},{"name":"\u5996\u5996\u5c0f\u7cbe","count":1},{"name":"\u6c49\u4e30\u7f51","count":1},{"name":"\u6bb5\u5b50\u697c","count":1},{"name":"\u6c5f\u82cf\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u65b0\u4eac\u62a5\u7f51","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1},{"name":"\u4e2d\u56fd\u8d28\u91cf\u65b0\u95fb\u7f51","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u5e7f\u544a\u4e5f\u75af\u72c2","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":1},{"name":"\u8001\u677f\u8bf4\u7684\u5bf9","count":1}];
const total = 49;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
