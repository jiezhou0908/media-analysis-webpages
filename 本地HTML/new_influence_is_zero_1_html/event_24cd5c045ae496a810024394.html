const data = [{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":8},{"name":"\u51e4\u51f0\u7f51","count":6},{"name":"\u6f6e\u8d77\u7f51","count":5},{"name":"\u55e8\u725b\u8d22\u7ecf","count":4},{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u4e2d\u56fd\u7f51","count":3},{"name":"\u8d22\u65b0\u7f51","count":3},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":3},{"name":"\u91d1\u878d\u754c","count":3},{"name":"\u548c\u8baf\u7f51","count":3},{"name":"\u817e\u8baf\u7f51","count":3},{"name":"\u8bc1\u5238\u4e4b\u661f","count":2},{"name":"\u7ecf\u6d4e\u89c2\u5bdf\u7f51","count":2},{"name":"\u4e50\u5c45\u623f\u4ea7","count":2},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":2},{"name":"\u65b0\u6d6a","count":2},{"name":"\u65b0\u6d6a\u8d22\u7ecf\u5ba2\u6237\u7aef","count":2},{"name":"\u754c\u9762\u65b0\u95fb","count":2},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":2},{"name":"\u7ecf\u6d4e\u89c2\u5bdf\u62a5","count":2},{"name":"\u4e91\u638c\u8d22\u7ecf","count":1},{"name":"\u6f6e\u5dde\u4eba\u65b0\u95fb\u7f51","count":1},{"name":"\u91d1\u8bc1\u7814","count":1},{"name":"\u73af\u7403\u8001\u864e\u8d22\u7ecf","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u4e2d\u56fd\u8d44\u672c\u7f51","count":1},{"name":"\u5de8\u6f6e\u8d44\u8baf\u7f51","count":1},{"name":"\u76ca\u76df\u64cd\u76d8\u624b","count":1},{"name":"\u5168\u666f\u7f51","count":1},{"name":"\u7ecf\u6d4e\u89c2\u5bdf\u62a5\u5fae\u4fe1\u53f7","count":1},{"name":"\u8d44\u672c\u90a6","count":1},{"name":"\u53c2\u8003\u7ecf\u6d4e\u7f51","count":1},{"name":"\u8d22\u8054\u793e","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9\u7f51","count":1},{"name":"\u5357\u90fd\u7ecf\u6d4e","count":1},{"name":"\u9a71\u52a8\u4e2d\u56fd","count":1},{"name":"\u4e2d\u56fd\u7ecf\u8425\u62a5","count":1},{"name":"\u7b2c\u4e00\u8d22\u7ecf","count":1},{"name":"\u5317\u65b9\u7f51","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u6df1\u5733\u70ed\u7ebf","count":1},{"name":"\u957f\u6 const total = 97;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
