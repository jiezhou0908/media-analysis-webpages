const data = [{"name":"\u65b0\u6d6a","count":7},{"name":"\u73af\u7403\u7f51","count":5},{"name":"\u597d\u5947\u5fc3\u65e5\u62a5","count":3},{"name":"\u641c\u72d0","count":2},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":2},{"name":"\u65e0\u90aa","count":2},{"name":"\u7f51\u6613","count":2},{"name":"\u80a1\u57ce\u7f51","count":2},{"name":"\u65b0\u4eac\u62a5","count":2},{"name":"\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":1},{"name":"\u96f6\u98df\u59ec","count":1},{"name":"\u6210\u529f\u4fdd\u9669\u7f51","count":1},{"name":"\u672a\u6765\u7f51","count":1},{"name":"\u71c3\u65b0\u95fb\u89c6\u9891","count":1},{"name":"\u6e38\u4fa0\u7f51","count":1},{"name":"\u6d77\u5ce1\u7f51","count":1},{"name":"\u6c5f\u82cf\u7701\u5e7f\u544a\u534f\u4f1a","count":1},{"name":"\u676d\u5dde\u7f51","count":1},{"name":"\u5e7f\u544a\u95e8","count":1},{"name":"M\u5927\u738b\u53eb\u6211\u6765\u5de1\u5c71","count":1},{"name":"\u5ddd\u5317\u5728\u7ebf","count":1},{"name":"\u6d77\u5916\u5a31\u95fb","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u8054\u5546\u7f51","count":1},{"name":"V\u7535\u5f71","count":1},{"name":"\u6c5f\u82cf\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u695a\u79c0\u7f51","count":1},{"name":"\u65b0\u4eac\u62a5\u5373\u65f6\u65b0\u95fb","count":1},{"name":"\u841d\u535c\u62a5\u544a","count":1},{"name":"\u8f66\u82e5\u521d\u89c1","count":1},{"name":"Peter\u5988\u5988\u7684\u65e5\u8bb0","count":1},{"name":"\u4e07\u80fd\u7684\u5927\u718a","count":1},{"name":"\u65b0\u68a6\u7f51","count":1},{"name":"\u73af\u770b\u5168\u7403","count":1},{"name":"\u65b0\u6d6a\u80b2\u513f","count":1},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u732b\u6251","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u5b85\u8150\u96c6\u4e2d\u8425","count":1},{"name":"\u674e\u94c1\u6839","count":1},{"name":"YouTube\u7cbe\u5f69\u89c6\u9891","count":1},{"name":"\u65b0\u6d6a\u65b0\u624b\u5361\u4e2d\u5fc3" const total = 80;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
