const data = [{"name":"\u65b0\u6d6a","count":7},{"name":"\u4e2d\u7814\u7f51","count":4},{"name":"\u6d77\u5ce1\u7f51","count":3},{"name":"\u798f\u5efa\u95fd\u5357\u7f51","count":2},{"name":"\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":2},{"name":"\u4e09\u8a00\u8d22\u7ecf","count":2},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u5f15\u529b\u8d44\u8baf","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u5434\u6d69","count":1},{"name":"\u4e92\u8054\u7f51\u5708\u5185\u4e8b","count":1},{"name":"\u7535\u8111\u62a5","count":1},{"name":"\u4e07\u5bb6\u70ed\u7ebf","count":1},{"name":"\u65f6\u95f4\u89c6\u9891","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u9047\u89c1\u5c0fmi","count":1},{"name":"\u5f20\u9a8f\u96c4","count":1},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":1},{"name":"\u591a\u77e5\u7f51","count":1},{"name":"\u4e1c\u65b9\u5934\u6761","count":1},{"name":"\u4fde\u654f\u6d2a","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u732b\u6251","count":1},{"name":"\u5357\u65b9\u4eba\u7269\u5468\u520a","count":1},{"name":"\u7ecf\u5546","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":1},{"name":"\u97ad\u725b\u58eb","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"ZAKER\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"\u97ad\u725b\u58ebBianews","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u4e91\u638c\u8d22\u7ecf","count":1},{"name":"\u79d1\u6280\u751f\u6d3b\u5feb\u62a5","count":1},{"name":"\u5357\u65b9\u8d22\u5bcc\u7f51","count":1}];
const total = 51;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
