const data = [{"name":"\u91d1\u878d\u754c","count":5},{"name":"\u7f51\u6613\u65b0\u95fb","count":4},{"name":"\u4e2d\u56fd\u7f51","count":4},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":4},{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u8d22\u7ecf\u7f51","count":3},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":2},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":2},{"name":"\u8054\u5546\u7f51","count":2},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u6211\u7684\u7164\u70ad\u7f51","count":1},{"name":"\u661f\u5c9b\u73af\u7403\u7f51","count":1},{"name":"\u4e2d\u56fd\u57fa\u91d1\u62a5\u7f51","count":1},{"name":"\u5317\u4eac\u5546\u62a5\u7f51","count":1},{"name":"\u5468\u5230","count":1},{"name":"\u5468\u5230\u4e0a\u6d77","count":1},{"name":"\u56f4\u89c2","count":1},{"name":"\u897f\u90e8\u51b3\u7b56\u7f51","count":1},{"name":"\u5df4\u4e2d\u5728\u7ebf","count":1},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":1},{"name":"\u4e3d\u4eba\u670d\u88c5\u7f51","count":1},{"name":"IT\u4e13\u5bb6\u7f51","count":1},{"name":"\u4e2d\u56fd\u8d28\u91cf\u65b0\u95fb\u7f51","count":1},{"name":"\u676d\u5dde\u7f51","count":1},{"name":"\u53f0\u6d77\u7f51","count":1},{"name":"\u6c5f\u897f\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf\u8d22\u7ecf\u53f7","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u5934\u6761\u535a\u5ba2","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"\u4e1c\u5317\u65b0\u95fb\u7f51","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":1},{"name":"\u8346\u695a\u7f51","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u4e0a\u6d77\u5e02\u5e02\u573a\u76d1\u7763\u7ba1\u7406\u5c40\u7f51\u7ad9","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"\u8bfb\u521b\u8d22\u7ecf","count":1},{"name":"\u95ea\u7535\u65b0\u95fb","count":1},{"name":"\u56fd\u9645\u91d1\u878d\u62a5\u7f51","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u897f\u90e8\u51b3\u7b56\u7f51\u5b98\u65b9\u5fae\u535a","count":1}];
const total = 67;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
