const data = [{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":6},{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u7f51\u6613","count":3},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":3},{"name":"\u8d22\u7ecf\u94bb","count":3},{"name":"\u4e2d\u56fd\u6d88\u8d39\u8005\u62a5","count":3},{"name":"\u5feb\u8d44\u8baf","count":2},{"name":"\u540c\u82b1\u987a","count":2},{"name":"\u7535\u5f71\u754c","count":2},{"name":"\u5e02\u573a\u8d44\u8baf","count":2},{"name":"\u65b0\u534e\u793e","count":2},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":2},{"name":"\u91d1\u878d\u754c","count":2},{"name":"IT\u4e13\u5bb6\u7f51","count":2},{"name":"\u590d\u5236\u672a\u6765copyfuture","count":1},{"name":"\u6d31\u6d77\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u6781\u5149\u65b0\u95fb","count":1},{"name":"\u817e\u8baf\u65b0\u95fb","count":1},{"name":"\u5546\u6d1b\u5a31\u4e50\u65b0\u95fb\u7f51","count":1},{"name":"\u6211\u7684\u7164\u70ad\u7f51","count":1},{"name":"\u53f0\u6d77\u7f51","count":1},{"name":"\u5bcc\u9014\u725b\u725b","count":1},{"name":"\u80a1\u53cb9V05c78300","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u9274\u5b9a","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u5954\u817e\u878d\u5a92","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u534e\u5546\u7f51","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u4e1c\u5317\u65b0\u95fb\u7f51","count":1},{"name":"cnBeta","count":1},{"name":"\u5927\u6c5f\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u9752\u5c9b\u65b0\u95fb\u7f51","count":1},{"name":"\u676d\u5dde\u7f51","count":1},{"name":"\u91d1\u534e\u65b0\u95fb\u7f51","count":1},{"name":"\u6e56\u5317\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u4e2d\u56fd\u8d28\u91cf\u65b0\u95fb\u7f51\u5fae\u4fe1\u516c\u4f17\u53f7","count":1},{"name":"\u4e2d\u56fd\u8d28\u91cf\u65b0\u95fb\u7f51\u5fae\u4fe1\u516c\u53f7","count":1},{"name":"\u5f53\u4ee3\u5148\u950b\u7f51","count":1},{"name":"\u4e2d\u56fd\u8d44\u672c\u7f51","count":1}];
const total = 70;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
