        data:{

            datasets:[{
                label:'占比 (%)',

                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
