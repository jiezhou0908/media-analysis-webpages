const data = [{"name":"\u592a\u5e73\u6d0b\u6c7d\u8f66\u7f51","count":4},{"name":"IT\u4e13\u5bb6\u7f51","count":3},{"name":"\u8bc1\u5238\u4e4b\u661f","count":2},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":2},{"name":"\u4e1c\u65b9\u4f01\u4e1a\u5bb6","count":2},{"name":"\u5feb\u79d1\u6280","count":2},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":2},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u6e38\u4fa0\u7f51","count":1},{"name":"\u7ecf\u6d4e\u7f51","count":1},{"name":"\u6e38\u620f\u8ff7\u8bf4\u8f66","count":1},{"name":"\u8d70\u8fdb\u4e2d\u5173\u6751","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u5468\u520a","count":1},{"name":"\u5929\u6d25\u6ee8\u6d77\u7f51","count":1},{"name":"\u4e2d\u56fd\u5916\u8d38\u7f51","count":1},{"name":"\u6c7d\u626f\u6252\u8c08","count":1},{"name":"CNMO","count":1},{"name":"\u667a\u8f66\u6d3e","count":1},{"name":"\u6c7d\u8f66\u70b9\u8bc4","count":1},{"name":"ZAKER\u6c7d\u8f66","count":1},{"name":"\u6c38\u5609\u7f51","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u4e09\u95e8\u5ce1\u7ad9\u957f\u7f51","count":1},{"name":"\u97ad\u725b\u58eb","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u5357\u65b9Plus","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u6c5f\u82cf\u7f51","count":1},{"name":"IT\u4e4b\u5bb6 (\u59dc\u6c5f)","count":1},{"name":"\u77f3\u5bb6\u5e84\u4f20\u5a92\u7f51","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u590d\u5236\u672a\u6765copyfuture","count":1}];
const total = 46;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
