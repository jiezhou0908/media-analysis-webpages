const data = [{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":2},{"name":"\u6c7d\u8f66\u4e2d\u56fd\u7f51","count":2},{"name":"\u65b0\u6d6a\u6c7d\u8f66","count":2},{"name":"\u80a1\u57ce\u7f51","count":2},{"name":"\u6df1\u5733\u70ed\u7ebf","count":2},{"name":"\u6613\u8f66\u7f51","count":1},{"name":"\u81f3\u8bda\u8d22\u7ecf","count":1},{"name":"\u79e6\u738b\u9053\u8f66","count":1},{"name":"IT\u5546\u4e1a\u65b0\u95fb\u7f51","count":1},{"name":"\u6c7d\u8f66\u65b9\u5411\u78d0","count":1},{"name":"\u534e\u5546\u8bba\u575b","count":1},{"name":"7\u8f66\u573a","count":1},{"name":"\u731b\u72b8\u89c6\u9891","count":1},{"name":"\u79d2\u770b\u751f\u6d3b","count":1},{"name":"\u8fa3\u54e5\u8bf4\u8f66","count":1},{"name":"\u54c1\u51a0\u6c7d\u8f66","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf\u7efc\u5408","count":1},{"name":"\u996d\u540e\u804a\u8f66","count":1},{"name":"\u5b9e\u62cd\u73b0\u573a","count":1},{"name":"\u8c6b\u4e1c\u878d\u5a92","count":1},{"name":"AI\u6c7d\u8f66\u5708","count":1},{"name":"\u81ea\u4e3b\u6c7d\u8f66","count":1},{"name":"\u5f15\u529b\u8d44\u8baf","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u65b0\u68a6\u7f51","count":1},{"name":"\u4e2d\u5173\u6751\u5728\u7ebf\u5ba2\u6237\u7aef","count":1},{"name":"\u817e\u8baf\u7f51","count":1},{"name":"\u540c\u8f66\u65f6\u4ee3","count":1},{"name":"\u4e2d\u5173\u6751\u5728\u7ebf","count":1},{"name":"CCTV\u8001\u6545\u4e8b\u534e\u590f\u4e4b\u65c5","count":1}];
const total = 35;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
