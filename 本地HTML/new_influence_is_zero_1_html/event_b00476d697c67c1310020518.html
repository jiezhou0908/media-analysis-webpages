            <tr><td>原帖链接</td><td><a href="https://ef.zhiweidata.com/event/b00476d697c67c1310020518/profileV2" target="_blank">https://ef.zhiweidata.com/event/b00476d697c67c1310020518/profileV2</a></td></tr>
        </table>
    </div>
    <div class="chart"><canvas id="chart"></canvas></div>

</div>

<script>
const data = [{"name":"IT\u89c2\u5bdf\u733f","count":2},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":2},{"name":"\u65b0\u6d6a\u79d1\u6280","count":2},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u79d1\u6280\u7f8e\u5b66","count":1},{"name":"iOS\u5f00\u53d1","count":1},{"name":"\u5927\u6cb3\u62a5","count":1},{"name":"\u949b\u5a92\u4f53","count":1},{"name":"36\u6c2a","count":1},{"name":"\u730e\u4e91\u7f51","count":1},{"name":"\u4e00\u53e5\u6b63\u80fd\u91cf\u7684\u8bdd","count":1},{"name":"i\u9ed1\u9a6c","count":1},{"name":"\u624b\u673a\u4e2d\u56fd","count":1},{"name":"\u521b\u4e1a\u90a6","count":1},{"name":"\u6210\u90fd\u53d1\u5e03","count":1},{"name":"\u817e\u8baf\u79d1\u6280","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u4e2d\u56fd\u79fb\u52a8\u624b\u673a\u4ff1\u4e50\u90e8","count":1},{"name":"\u4e2d\u7814\u7f51","count":1}];
const total = 24;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
