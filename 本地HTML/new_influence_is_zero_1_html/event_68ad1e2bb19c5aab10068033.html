<script>
const data = [{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":11},{"name":"ZOL\u4e2d\u5173\u6751\u5728\u7ebf","count":4},{"name":"\u73af\u7403\u79d1\u6280\u7f51","count":3},{"name":"\u98de\u8c61\u7f51","count":2},{"name":"\u548c\u8baf\u7f51","count":2},{"name":"IT\u4e13\u5bb6\u7f51","count":2},{"name":"\u5546\u6d1b\u5a31\u4e50\u65b0\u95fb\u7f51","count":2},{"name":"\u97ad\u725b\u58eb","count":2},{"name":"BiaNews\u97ad\u725b\u58eb","count":2},{"name":"\u65b0\u6d6a\u79d1\u6280","count":2},{"name":"CCTV\u8bc1\u5238\u8d44\u8baf\u535a\u89c8","count":2},{"name":"\u780d\u67f4\u7f51","count":1},{"name":"\u7b2c\u4e00\u8d22\u7ecf","count":1},{"name":"\u9ed1\u9a6c\u516c\u793e","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"\u9a84\u9633\u7f51","count":1},{"name":"\u79d1\u6280S\u8bc4","count":1},{"name":"\u54b8\u8c08\u79d1\u6280\u9986","count":1},{"name":"\u8d70\u8fdb\u4e2d\u5173\u6751","count":1},{"name":"\u4f18\u5730\u7f51","count":1},{"name":"\u897f\u5b89\u5546\u7f51","count":1},{"name":"\u5c0f\u5e03\u5728\u672a\u6765\u751f\u6d3b","count":1},{"name":"\u6e38\u620f\u7231\u597d\u8005","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u5c0f\u9ed1\u76d2","count":1},{"name":"\u67e5\u67e5\u5427","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"ZAKER\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"IT\u5546\u4e1a\u79d1\u6280\u7f51","count":1},{"name":"\u7535\u8111\u62a5","count":1},{"name":"TechWeb","count":1},{"name":"\u67f3\u5dde\u90fd\u5e02\u5728\u7ebf","count":1},{"name":"\u7f8a\u57ce\u767e\u59d3\u7f51","count":1},{"name":"\u4eba\u6c11\u878d\u5a92\u4f53 \u767e\u5bb6\u53f7","count":1},{"name":"\u5feb\u79d1\u6280 \u767e\u5bb6\u53f7","count":1},{"name":"\u7b2c\u4e00\u8d22\u7ecf\u8d44\u8baf","count":1},{"name":"\u817e\u725b\u7f51","count":1}];
const total = 61;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
