const data = [{"name":"\u817e\u8baf\u7f51","count":19},{"name":"\u7f51\u6613","count":10},{"name":"\u7f51\u6613\u65b0\u95fb","count":6},{"name":"\u641c\u72d0\u7f51","count":5},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":5},{"name":"ZAKER","count":4},{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u548c\u8baf\u7f51","count":3},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":2},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":2},{"name":"\u91d1\u878d\u754c","count":2},{"name":"\u8bc1\u5238\u4e4b\u661f","count":2},{"name":"\u786c\u6838\u7126\u70b9","count":2},{"name":"\u4e2d\u56fd\u7f51","count":2},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u51e4\u51f0\u7f51","count":2},{"name":"\u8d22\u7ecf\u94bb","count":2},{"name":"\u4e50\u5c45\u8d22\u7ecf","count":1},{"name":"\u7f51\u6613\u8ba2\u9605","count":1},{"name":"DoNews","count":1},{"name":"\u591a\u7279\u8f6f\u4ef6\u7ad9","count":1},{"name":"\u91d1\u8bc4\u5a92","count":1},{"name":"\u91d1\u8bc4\u5a92JPM","count":1},{"name":"\u4e2d\u56fd\u8d22\u7ecf\u65f6\u62a5\u7f51","count":1},{"name":"\u94a5\u57ce\u7f51","count":1},{"name":"\u5b89\u5fbd\u95e8\u6237\u7f51\u7ad9","count":1},{"name":"\u624b\u673a\u51e4\u51f0\u7f51","count":1},{"name":"\u590d\u5236\u672a\u6765copyfuture","count":1},{"name":"\u53c2\u8003\u7ecf\u6d4e\u7f51","count":1},{"name":"\u4e09\u8a00\u8d22\u7ecf","count":1},{"name":"\u97ad\u725b\u58eb","count":1},{"name":"\u4eba\u6c11\u7f51","count":1},{"name":"\u5927\u4f17\u7f51","count":1},{"name":"\u79d1\u6280\u8baf","count":1},{"name":"\u9f50\u9c81\u665a\u62a5\u7f51","count":1},{"name":"\u95fd\u5357\u7f51","count":1},{"name":"\u9a71\u52a8\u4e2d\u56fd","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"TechWeb","count":1},{"name":"A5\u521b\u4e1a\u7f51","count":1},{"name":"\u56db\u6d77\u7f51","count":1},{"name":"\u6210\u529f\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u6d6a","count":1},{"name":"\u6cdb\u50a8\u65b0\u95fb\u7f51","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"IT\u4e13\u5bb6\u7f51","count":1}];
const total = 103;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
