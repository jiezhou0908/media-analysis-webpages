            <tr><td>媒体来源数</td><td>20</td></tr>
            <tr><td>原帖链接</td><td><a href="https://ef.zhiweidata.com/event/78c7dad8b6be647a10083623/profileV2" target="_blank">https://ef.zhiweidata.com/event/78c7dad8b6be647a10083623/profileV2</a></td></tr>

    </div>
    <div class="chart"><canvas id="chart"></canvas></div>
    <div class="footer"><p>专业舆情分析工具</p></div>
</div>

<script>
const data = [{"name":"\u7f51\u6613","count":4},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":2},{"name":"\u5168\u7403\u6f6e\u6d41\u8857\u62cd","count":2},{"name":"\u7ea2\u7f51","count":2},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":2},{"name":"\u7ea2\u7f51\u65f6\u523b","count":2},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"\u6781\u76ee\u65b0\u95fb","count":2},{"name":"\u65b0\u95fb360","count":1},{"name":"\u6cb8\u70b9\u89c6\u9891","count":1},{"name":"\u817e\u8baf\u7f51","count":1},{"name":"\u65b9\u5bf8\u4e4b\u8c08","count":1},{"name":"\u6570\u82f1\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u8d22\u7ecf\u94bb","count":1},{"name":"\u864e\u55c5APP","count":1},{"name":"\u9541\u5ba2\u7f51","count":1},{"name":"hao123","count":1},{"name":"\u6211\u4eec\u90fd\u7231\u91cd\u53e3\u5473","count":1},{"name":"\u4e2d\u56fd\u5e7f\u544a\u7f51","count":1}];
const total = 30;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
