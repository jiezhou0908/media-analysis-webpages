const data = [{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":6},{"name":"\u65b0\u6d6a\u79d1\u6280","count":5},{"name":"\u65b0\u6d6a\u7f51","count":4},{"name":"\u590d\u5236\u672a\u6765copyfuture","count":2},{"name":"36\u6c2a","count":2},{"name":"\u7f51\u6613\u65b0\u95fb","count":2},{"name":"\u7efc\u6295\u7f51","count":2},{"name":"\u94a2\u4f01\u7f51","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u521b\u4e1a\u90a6","count":2},{"name":"\u5ddd\u62a5\u89c2\u5bdf","count":2},{"name":"\u73af\u7403\u79d1\u6280\u7f51","count":2},{"name":"\u6f8e\u62dc\u65b0\u95fb","count":1},{"name":"\u8bfb\u521b\u8d22\u7ecf","count":1},{"name":"\u56fd\u9645\u91d1\u878d\u62a5\u7f51","count":1},{"name":"\u70ed\u641c","count":1},{"name":"\u70ed\u70b9biu biu biu","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u5934\u6761\u535a\u5ba2","count":1},{"name":"\u8d22\u7ecf\u94bb","count":1},{"name":"\u8d22\u7ecf\u4ea7\u4e1a\u7f51","count":1},{"name":"\u817e\u8baf\u65b0\u95fb","count":1},{"name":"\u5927\u4f17\u7ecf\u6d4e\u7f51","count":1},{"name":"\u4e09\u8a00\u8d22\u7ecf","count":1},{"name":"\u9a6c\u8d5b\u514b","count":1},{"name":"\u6728\u5170\u56f4\u573a","count":1},{"name":"\u9759\u4e50\u4fe1\u606f\u793e","count":1},{"name":"\u5546\u6d1b\u5a31\u4e50\u65b0\u95fb\u7f51","count":1},{"name":"\u4f01\u4e1a\u4fe1\u7528\u7f51","count":1},{"name":"\u73af\u7403\u5468\u520a\u7f51","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"C114\u901a\u4fe1\u7f51","count":1},{"name":"CCTV\u8bc1\u5238\u8d44\u8baf\u535a\u89c8","count":1},{"name":"\u949b\u5a92\u4f53","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u65e0\u9521\u79fb\u52a8","count":1},{"name":"cnBeta","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"\u661f\u5ea7\u604b\u60f3\u66f2","count":1},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":1},{"name":"\u4e1c\u65b9\u7f51","count":1},{"name":"\u624b\u673a\u4e2d\u56fd","count":1},{"name":"\u592e\u89c6\u7f51","count":1},{"name":"\u4e2d\u56fd\ const total = 74;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
