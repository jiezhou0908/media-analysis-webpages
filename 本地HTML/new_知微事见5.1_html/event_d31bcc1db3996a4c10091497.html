const data = [{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u52b3\u52a8\u62a5","count":2},{"name":"\u5934\u6761\u535a\u5ba2","count":2},{"name":"\u6781\u76ee\u65b0\u95fb","count":2},{"name":"\u7ea2\u661f\u65b0\u95fb","count":2},{"name":"\u676d\u5dde\u65e5\u62a5","count":2},{"name":"\u5927\u6c5f\u7f51","count":2},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":2},{"name":"\u6c5f\u5357\u90fd\u5e02\u62a5","count":2},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":2},{"name":"\u91cd\u5e86\u6668\u62a5","count":2},{"name":"\u6df1\u5733\u5927\u4ef6\u4e8b","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u70ed\u70b9\u8ffd\u51fb","count":1},{"name":"\u5927\u6c5f\u65b0\u95fb","count":1},{"name":"\u72d0\u5ea6","count":1},{"name":"\u6700\u957f\u4e00\u67aa","count":1},{"name":"\u884c\u4e1a\u516c\u53f8\u8bba","count":1},{"name":"\u5bcc\u9014\u725b\u725b","count":1},{"name":"DoNews","count":1},{"name":"\u6df1\u5733\u5de5\u4f1a","count":1},{"name":"\u5357\u65b9\u65e5\u62a5","count":1},{"name":"\u5927A\u7ffb\u8bd1\u5b98","count":1},{"name":"\u8001\u864e\u793e\u533a","count":1},{"name":"\u7b2c1\u7ebf\u6444\u50cf\u673a","count":1},{"name":"\u8bc1\u5238\u65f6\u62a5","count":1},{"name":"\u76f4\u64ad\u5427","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u821c\u7f51","count":1},{"name":"\u754c\u9762\u65b0\u95fb","count":1},{"name":"\u6e29\u5dde\u665a\u62a5","count":1},{"name":"Vista\u770b\u5929\u4e0b","count":1},{"name":"\u5b81\u6ce2\u665a\u62a5","count":1},{"name":"\u6df7\u6c8c\u4e07\u82b1\u7b52","count":1}];
const total = 46;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
