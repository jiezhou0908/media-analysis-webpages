const data = [{"name":"\u65b0\u9ec4\u6cb3","count":6},{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u9876\u7aef\u65b0\u95fb","count":2},{"name":"\u5feb\u79d1\u6280","count":2},{"name":"\u5b81\u6ce2\u665a\u62a5","count":2},{"name":"\u6c5f\u5357\u90fd\u5e02\u62a5","count":2},{"name":"\u6e56\u5357\u4ea4\u901a\u9891\u9053","count":2},{"name":"\u4e92\u8054\u7f51\u89c6\u9891","count":2},{"name":"\u79cb\u767d","count":2},{"name":"\u7231\u6d4e\u5357\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"\u674e\u5de7\u59b9","count":1},{"name":"\u8d22\u95fb\u793e","count":1},{"name":"\u6781\u5149\u65b0\u95fb","count":1},{"name":"\u5927\u6cb3\u62a5","count":1},{"name":"\u5927\u516c\u4ea7\u7ecf\u665a\u95f4\u6d88\u606f","count":1},{"name":"\u6d88\u8d39\u4fdd","count":1},{"name":"\u5f20\u4e9a\u666e","count":1},{"name":"\u5927\u671b\u8d22\u8baf","count":1},{"name":"\u65b0\u9ec4\u6cb3\u00b7\u6d4e\u5357\u65f6\u62a5","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"PCHOME","count":1},{"name":"\u6d4e\u5357\u65f6\u62a5","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u5927\u8c61\u7f51\u6cb3\u5357\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u5927\u8c61\u65b0\u95fb","count":1},{"name":"\u8f6f\u4ef6","count":1},{"name":"\u51cf\u80a5\u7f8e\u5bb9\u517b\u751f\u767e\u79d1","count":1},{"name":"\u6587\u5316\u89c6\u754c","count":1},{"name":"\u7a7a\u6e9f","count":1},{"name":"\u674e\u777f","count":1},{"name":"\u5927\u667a\u6167","count":1},{"name":"\u6cc9\u5dde\u901a","count":1},{"name":"\u6e56\u5357\u65e5\u62a5","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u5927\u6c5f\u7f51","count":1},{"name":"\u6c5f\u897f\u65b0\u95fb","count":1}];
const total = 50;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
