const data = [{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u6c5f\u5357\u90fd\u5e02\u62a5","count":2},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u70ed\u70b9\u65f6\u5c1a\u98ce","count":2},{"name":"\u65f6\u5c1a\u7231\u8f66\u63a7","count":2},{"name":"\u9752\u5c9b\u4fe1\u606f\u6e2f","count":2},{"name":"\u90fd\u5e02\u73b0\u573a","count":2},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"Vista\u6c22\u5546\u4e1a","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u5934\u90e8\u8d22\u7ecf","count":1},{"name":"\u5927\u4f17\u62a5\u4e1a\u00b7\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"5D\u8c03\u67e5","count":1},{"name":"\u6cb3\u5357\u90fd\u5e02\u9891\u9053","count":1},{"name":"\u96f6\u6001LT","count":1},{"name":"\u5de8\u5934\u8d22\u7ecf","count":1},{"name":"\u70ed\u5ea6\u65b0\u95fb","count":1},{"name":"\u6eda\u52a8\u64ad\u62a5","count":1},{"name":"\u5e7f\u4e1c\u5728\u7ebf","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u4fe1\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u827e\u666e\u601d\u8206\u60c5\u6d1e\u5bdf","count":1},{"name":"\u4e92\u91d1\u89c2\u5bdf\u7ad9","count":1},{"name":"\u7ecf\u89c6\u76f4\u64ad","count":1},{"name":"\u51e4\u51f0\u7f51\u79d1\u6280","count":1},{"name":"\u9ed1\u732b\u6295\u8bc9","count":1},{"name":"\u5168\u7403\u6c7d\u8f66E\u7ebf","count":1},{"name":"\u6700\u65b0\u6c7d\u8f66\u8d44\u8baf\u62a5\u9053","count":1},{"name":"IT\u79d1\u6280\u6570\u7801\u8fbe\u4eba","count":1},{"name":"\u5168\u7403IT\u6570\u7801\u6392\u884c\u699c","count":1},{"name":"\u5934\u6761\u535a\u5ba2","count":1},{"name":"\u65f6\u5c1a\u8da3\u5473\u9327","count":1},{"name":"\u5168\u7403\u521b\u610f\u65f6\u5c1a\u699c","count":1},{"name":"\u5c01\u9762\u65b0\u95fb","count":1},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u7 const total = 58;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
