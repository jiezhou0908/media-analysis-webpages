const data = [{"name":"\u6c88\u9633\u7f51","count":4},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u6f47\u6e58\u6668\u62a5","count":3},{"name":"\u65b0\u665a\u62a5","count":3},{"name":"\u957f\u6c99\u665a\u62a5","count":2},{"name":"\u5c0f\u8389\u5e2e\u5fd9","count":2},{"name":"\u6210\u90fd\u5546\u62a5","count":2},{"name":"19\u697c","count":2},{"name":"\u641c\u72d0","count":2},{"name":"\u5e7f\u5dde\u5988\u5988\u7f51","count":2},{"name":"\u4e2d\u8bbf\u7f51","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u6f47\u6e58\u6668\u62a5\u3001\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u4eac\u62a5\u7f51","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u94b1\u6c5f\u665a\u62a5","count":1},{"name":"\u5929\u5929\u5728\u7ebf","count":1},{"name":"\u6606\u660e\u4fe1\u606f\u6e2f","count":1},{"name":"\u5929\u5929\u8d22\u7ecf116","count":1},{"name":"\u6df1\u5733\u5927\u4ef6\u4e8b","count":1},{"name":"\u67f4\u72d7\u592b\u65af\u57fa","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"\u9ccc\u5934\u8d22\u7ecf","count":1},{"name":"\u6d77\u535a\u5065\u5eb7","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5\u3001N\u89c6\u9891\u62a5\u9053","count":1},{"name":"\u9752\u5c9b\u5e02\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"\u73af\u7403\u53f7","count":1},{"name":"\u9f50\u9c81\u665a\u62a5","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u534e\u9f99\u7f51","count":1},{"name":"\u6e56\u5317\u7ecf\u89c6","count":1},{"name":"\u5c0f\u5f3a\u70ed\u7ebf\u6d59\u6c5f\u6559\u79d1","count":1},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":1},{"name":"\u65b0\u95fb\u591c\u822a","count":1},{"name":"\u70ed\u70b9\u8ffd\u51fb","count":1}];
const total = 53;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
