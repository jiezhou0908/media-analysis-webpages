const data = [{"name":"i\u9ed1\u9a6c","count":5},{"name":"\u521b\u4e1a\u90a6","count":4},{"name":"\u767e\u5ea6\u6709\u9a7e","count":4},{"name":"\u754c\u9762\u65b0\u95fb","count":3},{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u8f66\u5b87\u4e16\u754c","count":3},{"name":"DoNews","count":2},{"name":"IT\u4e4b\u5bb6","count":2},{"name":"\u7b2c\u4e00\u7535\u52a8\u7f51","count":2},{"name":"\u91d1\u878d\u754c","count":2},{"name":"\u5934\u90e8\u8d22\u7ecf","count":2},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":2},{"name":"\u6c7d\u8f66\u884c\u4e1a\u5173\u6ce8","count":2},{"name":"\u8f66\u8d28\u7f51","count":1},{"name":"\u6b63\u5728\u8bf4\u8f66","count":1},{"name":"\u77b0\u5c1a\u8f66","count":1},{"name":"\u624b\u673a\u767e\u5ea6\u7f51\u53cb","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u91d1\u6854\u7f51","count":1},{"name":"\u963f\u7476\u8bf4\u8f66","count":1},{"name":"\u767d\u5e0c\u6587","count":1},{"name":"\u79cb\u79cb","count":1},{"name":"\u6770\u8f66\u79d1\u6280","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u53f7\u5916\u5de5\u4f5c\u5ba4","count":1},{"name":"\u7ecf\u89c2","count":1},{"name":"\u6211\u8981\u6c7d\u8f66\u7f51","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u6613\u8f66\u539f\u521b\u62a5\u9053\u5173\u96ea\u6d9bYC","count":1},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":1},{"name":"\u79d1\u6280\u730e","count":1},{"name":"36\u6c2a","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u6613\u8f66\u7f51","count":1},{"name":"\u4e2d\u56fd\u6c7d\u8f66\u62a5\u7f51","count":1},{"name":"\u6cf0\u4f2f\u7f51","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"IT\u4e4b\u5bb6  - \u6d69\u6e3a","count":1},{"name":"\u4e9a\u741b","count":1},{"name":"\u91d1\u878d\u754c\u7f51\u7ad9","count":1},{"name":"\u70ed\u70b9\u8ffd\u51fb","count":1},{"name":"\u524d\u6cbf\u770b\u70b9","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u626c\u5b50\u665a\u62a5\u7f51","count":1},{"name":"\u7d2b\u725b\u65b0\u95fb","count":1},{"name":"\u70ed\u641c\u7b14\u8bb0","count":1}];
const total = 70;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
