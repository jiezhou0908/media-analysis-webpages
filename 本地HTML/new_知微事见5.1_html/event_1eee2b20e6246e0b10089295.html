const data = [{"name":"\u641c\u72d0","count":4},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":3},{"name":"\u6620\u8c61\u7f51","count":3},{"name":"\u5927\u6cb3\u62a5","count":2},{"name":"\u9876\u7aef\u65b0\u95fb","count":2},{"name":"\u65b0\u95fb\u6668\u62a5","count":2},{"name":"\u5feb\u79d1\u6280","count":2},{"name":"\u5c0f\u8389\u5e2e\u5fd9","count":2},{"name":"\u5934\u6761\u535a\u5ba2","count":1},{"name":"\u9752\u5c9b\u65e5\u62a5\u793e\/\u89c2\u6d77\u65b0\u95fb","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u5929\u5929\u5728\u7ebf","count":1},{"name":"\u5929\u5929\u8d22\u7ecf116","count":1},{"name":"\u732b\u6251","count":1},{"name":"\u4e66\u751f\u5bb6\u7535\u7f51","count":1},{"name":"\u798f\u5dde\u65b0\u95fb\u7f51","count":1},{"name":"\u5927\u8c61\u65b0\u95fb","count":1},{"name":"\u9752\u62a5\u7f51","count":1},{"name":"\u5bb6\u7535\u6d88\u8d39\u7f51","count":1},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u5317\u4eac\u5546\u62a5","count":1},{"name":"DoNews","count":1},{"name":"\u65b0\u8bc6\u7814\u7a76\u6240","count":1},{"name":"\u4e2d\u56fd\u5bb6\u7535\u7f51","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"11\u6708\u7684\u6a02","count":1},{"name":"\u9f50\u9c81\u665a\u62a5-\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u65b0\u95fb\u6668\u62a5\u7efc\u5408","count":1},{"name":"\u6f47\u6e58\u6668\u62a5\u7f51","count":1},{"name":"\u751f\u6d3b\u5e2e","count":1},{"name":"\u754c\u9762\u65b0\u95fb","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"GPLP","count":1},{"name":"GPLP\u7280\u725b\u8d22\u7ecf","count":1},{"name":"GPLPCN","count":1},{"name":"\u5934\u90e8\u8d22\u7ecf","count":1},{"name":"\u5a92\u4f53\u754c","count":1},{"name":"IB\u8d44\u8baf","count":1},{"name":"\u5403\u996d\u7761\u89c9\u6253boss","count":1},{"name":"\u8fd9\u771f\u7684\u5f88\u4e0d\u5408\u7406","count":1},{"name":"\u6cb3\u5357\u7535\u89c6\u53f0\u30 const total = 62;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
