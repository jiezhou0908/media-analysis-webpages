const data = [{"name":"\u4e2d\u534e\u7f51","count":8},{"name":"\u90fd\u5e02\u73b0\u573a","count":3},{"name":"\u6620\u8c61\u7f51","count":3},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u5927\u8c61\u65b0\u95fb","count":2},{"name":"\u5b64\u72ec\u7684\u4e00\u76f4\u5b64\u72ec","count":1},{"name":"\u79d1\u666e100\u514b\u514b","count":1},{"name":"\u5e05\u661f\u9e4f\u60c5\u611f","count":1},{"name":"\u989c\u5982\u7389\u771f","count":1},{"name":"\u8f7b\u8f7b\u8033\u8bed","count":1},{"name":"\u868a\u975e\u4e5d\u5929","count":1},{"name":"\u4e2d\u7f51\u8d44\u8baf","count":1},{"name":"\u91d1\u955c\u89c2\u5bdf","count":1},{"name":"\u5927\u73ab\u4f59","count":1},{"name":"\u5929\u773c\u67e5","count":1},{"name":"\u968f\u6027\u81ea\u7531\u7684\u5927\u8f66","count":1},{"name":"\u9759\u6696\u6587\u5b57","count":1},{"name":"\u8d8a\u725b\u65b0\u95fb","count":1},{"name":"\u661f\u5c9b\u73af\u7403\u7f51","count":1},{"name":"\u5f71\u8a00\u5f71\u8bed","count":1},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u51b7\u541b\u804a\u5927\u7247","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u4eca\u65e5\u79d1\u6280\u8c08","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u6d2a\u5cf0","count":1},{"name":"\u91cd\u5e86\u6668\u62a5","count":1},{"name":"\u70b9\u65f6\u65b0\u95fb","count":1},{"name":"\u6eda\u52a8\u64ad\u62a5","count":1},{"name":"\u74dc\u7530\u65e5\u62a5","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u5929\u5730\u4e4b\u5b50","count":1},{"name":"\u5e03\u4e01\u5ff5\u5492\u8bed","count":1},{"name":"\u76f4\u64ad\u5427","count":1},{"name":"\u8d39\u83ab\u7eb5","count":1},{"name":"\u840c\u840cWKT","count":1},{"name":"\u51a0\u4e16","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u653e\u9632\u60c5\u611f","count":1},{"name":"star\u661f\u89c6\u9891","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1}];
const total = 55;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
