const data = [{"name":"\u5357\u65b9\u65e5\u62a5","count":4},{"name":"\u4e2d\u534e\u7f51","count":4},{"name":"\u5357\u90fd\u5468\u520a","count":3},{"name":"\u65b0\u5feb\u62a5","count":3},{"name":"IB\u8d44\u8baf","count":3},{"name":"\u5e7f\u5dde\u65e5\u62a5","count":3},{"name":"\u91d1\u7f8a\u7f51","count":2},{"name":"\u5149\u660e\u7f51","count":2},{"name":"17173\u6e38\u620f\u7f51\u7ad9","count":2},{"name":"\u7d2b\u91d1\u5c71\u65b0\u95fb","count":1},{"name":"\u4f73\u96c5\u4f0a1a","count":1},{"name":"\u5e7f\u4e1c\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u73e0\u6c5f\u7ecf\u6d4e\u53f0","count":1},{"name":"\u9165\u51b7\u82cd\u4e91\u6708","count":1},{"name":"\u8ffd\u74dc\u4e0d\u6253\u76f9","count":1},{"name":"\u793e\u4f1a\u7559\u8a00\u677f","count":1},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":1},{"name":"\u65f6\u523b\u65b0\u95fb","count":1},{"name":"\u70ed\u70b9\u8ffd\u51fb","count":1},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u76f4\u64ad\u5427","count":1},{"name":"\u6930\u7f51","count":1},{"name":"\u4e00\u5200\u67d2","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u7f57\u6d6e\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u6f47\u6e58\u6668\u62a5\u7f51","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u7ea2\u7f51","count":1},{"name":"\u90fd\u5e02\u73b0\u573a","count":1},{"name":"\u91cd\u5e86\u6668\u62a5","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u9f50\u9c81\u665a\u62a5","count":1},{"name":"\u4fe1\u606f\u65f6\u62a5","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"DoNews","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5\u5ba2\u6237\u7aef","count":1},{"name":"\u5927A\u7ffb\u8bd1\u5b98","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u6f47\u6e58\u6668\u62a5","count":1},{"name":"\u65b0\u5feb\u7f51","count":1},{"name":"\u4f11\u6627","count":1}];
const total = 63;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
