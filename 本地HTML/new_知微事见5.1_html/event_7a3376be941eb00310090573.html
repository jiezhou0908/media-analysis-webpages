    <div class="footer"><p>专业舆情分析工具</p></div>
</div>

<script>
const data = [{"name":"\u5357\u90fd\u5468\u520a","count":6},{"name":"\u5965\u4e00\u7f51","count":3},{"name":"36\u6c2a","count":2},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u9274\u5b9a","count":2},{"name":"IB\u8d44\u8baf","count":2},{"name":"\u5927\u6c5f\u65b0\u95fb","count":1},{"name":"\u4e09\u8a00\u79d1\u6280","count":1},{"name":"\u9ec4\u9e64\u4e91","count":1},{"name":"\u65b0\u8bc6\u7814\u7a76\u6240","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u798f\u5efa\u7ecf\u6d4e\u53d1\u5e03","count":1},{"name":"\u5a92\u4f53\u6eda\u52a8","count":1},{"name":"Lumens","count":1},{"name":"\u8d22\u7ecf","count":1},{"name":"Wind\u91d1\u878d","count":1},{"name":"\u7f51\u7ecf\u793e","count":1},{"name":"\u4e2d\u5173\u6751\u5546\u60c5\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"jojo\u9a84\u9633","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u540c\u82b1\u987a\u8d22\u7ecf","count":1},{"name":"\u548c\u8baf\u80a1\u7968","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"\u5b89\u5fbd\u4ea4\u901a\u5e7f\u64ad","count":1},{"name":"\u897f\u6e56\u4e4b\u58f0","count":1},{"name":"\u6e56\u5317\u7ecf\u89c6","count":1},{"name":"\u626c\u5b50\u665a\u62a5","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":1},{"name":"\u4e2d\u56fd\u7ecf\u6d4e\u7f51","count":1},{"name":"i\u9ed1\u9a6c","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u4e2d\u539f\u65b0\u95fb\u7f51","count":1}];
const total = 43;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
