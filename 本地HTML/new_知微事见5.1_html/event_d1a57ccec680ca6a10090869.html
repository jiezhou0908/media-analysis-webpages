const data = [{"name":"\u65b0\u6d6a\u7f51","count":5},{"name":"\u5357\u90fd\u5468\u520a","count":4},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":4},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u65b0\u95fb\u6668\u62a5","count":3},{"name":"\u73af\u7403\u7f51","count":2},{"name":"\u5965\u4e00\u7f51","count":2},{"name":"\u6210\u90fd\u5546\u62a5","count":2},{"name":"\u65b0\u8bc6\u7814\u7a76\u6240","count":2},{"name":"\u5de5\u4eba\u65e5\u62a5\u5ba2\u6237\u7aef","count":2},{"name":"\u58f9\u70b9","count":2},{"name":"\u767e\u59d3\u5173\u6ce8","count":2},{"name":"\u5fae\u535a\u8d22\u7ecf-\u8d22\u9053\u5de5\u4f5c\u5ba4","count":2},{"name":"\u4e2d\u56fd\u65b0\u95fb\u5468\u520a","count":2},{"name":"\u65b0\u6c11\u665a\u62a5","count":2},{"name":"\u65b0\u6d6a\u65b0\u95fb","count":1},{"name":"\u5e7f\u4e1c\u7f51\u7edc\u5e7f\u64ad\u7535\u89c6\u53f0","count":1},{"name":"\u59da\u6021\u68a6","count":1},{"name":"\u4eca\u65e5\u5173\u6ce8","count":1},{"name":"\u7ea2\u661f\u65b0\u95fb","count":1},{"name":"\u5e7f\u5dde\u65e5\u62a5","count":1},{"name":"\u534a\u5c9b\u6668\u62a5","count":1},{"name":"\u770b\u5440STV","count":1},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"\u638c\u4e0a\u6000\u5316","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1},{"name":"\u6f47\u6e58\u6668\u62a5\u7f51","count":1},{"name":"\u5c0f\u8349\u4e5f\u6709\u51fa\u4eba\u5934\u5730\u7684\u4e00\u5929","count":1},{"name":"\u54fc\u54fc\u54c8\u563f2023","count":1},{"name":"\u6613\u946b\u5546\u52a1\u7f51","count":1},{"name":"\u6c42\u6c42\u522b\u54ac\u6211\u4e86","count":1},{"name":"\u6000\u5316\u65b0\u95fb\u7f51","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u9274\u5b9a","count":1},{"name":"\u5357\u56fd\u65e9\u62a5","count":1},{"name":"\u65b0\u6e56\u5357","count":1},{"name":"\u94b1\u6c5f\u665a\u62a5","count":1},{"name":"i\u9ed1\u9a6c","count":1},{"name":"\u641c\u72d0","count":1},{"name":"\u5149\u660e\u7f51","count":1},{"name":"\u91cd\u5e86\u6668\u62a5","count":1},{"name":"\u91d1\u7 const total = 75;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
