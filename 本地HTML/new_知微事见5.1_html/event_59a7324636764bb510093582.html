const data = [{"name":"DoNews","count":3},{"name":"\u754c\u9762\u65b0\u95fb","count":3},{"name":"\u8d22\u7ecf\u7f51","count":2},{"name":"\u641c\u72d0","count":2},{"name":"\u5357\u65b9\u65e5\u62a5","count":2},{"name":"\u94b1\u6c5f\u665a\u62a5","count":2},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":2},{"name":"17173\u6e38\u620f\u7f51\u7ad9","count":2},{"name":"\u751f\u6d3b\u5e2e","count":1},{"name":"\u5f90\u745e\u9633","count":1},{"name":"\u4e2d\u534e\u7f51","count":1},{"name":"\u4e2d\u65b0\u7ecf\u7eac","count":1},{"name":"\u95ea\u7535\u65b0\u95fb","count":1},{"name":"\u5c0f\u9ed1\u76d2\u751f\u6d3b","count":1},{"name":"360\u6e38\u620f\u5927\u5385","count":1},{"name":"\u6e38\u6c11\u661f\u7a7a","count":1},{"name":"\u9996\u5e2d\u6d88\u8d39\u5b98V","count":1},{"name":"\u6781\u76ee\u65b0\u95fb","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u5357\u90fdN\u89c6\u9891APP \u00b7 \u5357\u90fd\u5373\u65f6","count":1},{"name":"\u91ca\u51e1\u5f71\u89c6","count":1},{"name":"\u9996\u5e2d\u6d88\u8d39\u5b98","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"\u73b0\u4ee3+","count":1},{"name":"\u4e2d\u56fd\u5546\u62a5\u7f51","count":1},{"name":"\u5185\u8499\u53e4\u6668\u62a5","count":1},{"name":"\u73b0\u4ee3\u5feb\u62a5\/\u73b0\u4ee3+\u7b49","count":1},{"name":"\u5357\u90fd\u5373\u65f6","count":1},{"name":"\u5927\u8c61\u65b0\u95fb","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u8bc1\u5238\u4e4b\u661f","count":1},{"name":"\u5168\u7403IT\u6570\u7801\u6392\u884c\u699c","count":1},{"name":"\u5934\u6761\u535a\u5ba2","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":1},{"name":"\u897f\u6e56\u4e4b\u58f0","count":1},{"name":"21\u4e16\u7eaa\u7ecf\u6d4e\u62a5\u9053","count":1},{"name":"\u65b0\u5468\u520a","count":1},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u592a\u5e73\u6d0b\u79d1\u6280\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u5168\u7403\u70ed\u95e8\u8bdd\u9898\u6392\u884c","count":1},{"name":"21\u7ecf\u6d4e\u7f51","count":1},{"name":"21\u89c6\u9891","count":1},{"name":"\u6781\u5149\u65b0\u95fb","count":1}];
const total = 59;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
