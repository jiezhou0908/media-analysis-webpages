const data = [{"name":"\u4e2d\u534e\u7f51","count":4},{"name":"\u5927\u8c61\u65b0\u95fb","count":3},{"name":"\u8d22\u7ecf\u7f51","count":3},{"name":"\u4e0a\u6e38\u65b0\u95fb","count":3},{"name":"\u91d1\u9519\u5200","count":2},{"name":"\u6781\u76ee\u65b0\u95fb","count":2},{"name":"\u9f50\u9c81\u58f9\u70b9","count":2},{"name":"\u6620\u8c61\u7f51","count":2},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u6625\u57ce\u665a\u62a5","count":2},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":2},{"name":"\u754c\u9762\u65b0\u95fb","count":2},{"name":"\u5934\u6761\u535a\u5ba2","count":2},{"name":"DoNews","count":2},{"name":"Vista\u6c22\u5546\u4e1a","count":1},{"name":"\u9876\u7aef\u65b0\u95fb","count":1},{"name":"\u65b0\u6d88\u8d39\u8d22\u7814\u793e","count":1},{"name":"\u5fae\u535a\u8d22\u7ecf-\u8d22\u9053\u5de5\u4f5c\u5ba4","count":1},{"name":"\u76f4\u64ad\u5427","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u91d1\u878d\u754c","count":1},{"name":"\u7efc\u4e1a\u7f51","count":1},{"name":"\u6d88\u8d39\u4fdd","count":1},{"name":"\u91d1\u878d\u754c\u7f51\u7ad9","count":1},{"name":"\u53c8\u5435\u5565\u5462\u4f60\u4eec","count":1},{"name":"\u4e16\u76f8","count":1},{"name":"\u65b0\u9ec4\u6cb3","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"\u534e\u5546\u7f51","count":1},{"name":"\u4e2d\u56fd\u80fd\u6e90\u7f51","count":1},{"name":"\u8d75\u7fca\u61ff","count":1},{"name":"\u65b0\u5feb\u62a5","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u592a\u5e73\u6d0b\u7535\u8111\u7f51","count":1},{"name":"\u4e1c\u5317\u65b0\u95fb\u7f51","count":1},{"name":"\u6e56\u5317\u7ecf\u89c6","count":1},{"name":"IT\u79d1\u6280\u6570\u7801\u8fbe\u4eba","count":1},{"name":"\u56db\u5ddd\u5728\u7ebf","count":1},{"name":"\u70ed\u70b9\u5a31\u4e50","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"\u632f\u4ead","count":1},{"name":"\u592a\u5e73\u6d0b\u79d1\u6280\u7f51","count":1},{"name":"\u70ed\u70b9","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u4e2d\u5b89\u5728\u7ebf","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1}];
const total = 66;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
