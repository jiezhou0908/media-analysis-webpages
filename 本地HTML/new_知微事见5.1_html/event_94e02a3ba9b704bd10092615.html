const data = [{"name":"\u6df1\u6e2f\u5728\u7ebf","count":5},{"name":"\u6620\u8c61\u7f51","count":4},{"name":"\u7ea2\u661f\u65b0\u95fb","count":3},{"name":"\u7f8a\u57ce\u665a\u62a5","count":3},{"name":"\u4e2d\u534e\u7f51","count":2},{"name":"\u5b81\u6ce2\u665a\u62a5","count":2},{"name":"\u91d1\u7f8a\u7f51","count":2},{"name":"\u5927\u8c61\u65b0\u95fb","count":2},{"name":"FM93\u4ea4\u901a\u4e4b\u58f0","count":2},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":2},{"name":"\u5b89\u5fbd\u7f51","count":1},{"name":"\u7f8a\u57ce\u6d3e","count":1},{"name":"\u5954\u817e\u878d\u5a92","count":1},{"name":"\u6cd5\u6cbb\u65e5\u62a5","count":1},{"name":"\u4e1c\u65b9\u8d44\u8baf","count":1},{"name":"\u6cb3\u5357\u90fd\u5e02\u9891\u9053","count":1},{"name":"\u798f\u5dde\u65b0\u95fb\u7f51","count":1},{"name":"\u5f00\u5c01\u653f\u6cd5","count":1},{"name":"\u9f50\u9c81\u58f9\u70b9","count":1},{"name":"\u58f9\u6df1\u5733","count":1},{"name":"\u5357\u6d77\u7f51\u5ba2\u6237\u7aef","count":1},{"name":"\u793e\u4f1a\u6211\u525b\u54e5","count":1},{"name":"\u70ed\u70b9","count":1},{"name":"\u6842\u6797\u751f\u6d3b\u7f51","count":1},{"name":"\u95ea\u7535\u65b0\u95fb","count":1},{"name":"\u5934\u6761\u65b0\u95fb","count":1},{"name":"\u6e56\u5317\u7ecf\u89c6","count":1},{"name":"\u641c\u72d0","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u6f8e\u6e43\u65b0\u95fb","count":1},{"name":"\u65b0\u95fb\u6668\u62a5","count":1},{"name":"\u65b0\u6d6a\u89c6\u9891","count":1},{"name":"\u6700\u89c6\u9891","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u5feb\u79d1\u6280\u5b98\u65b9","count":1},{"name":"DoNews","count":1},{"name":"17173\u6e38\u620f\u7f51\u7ad9","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"\u95ea\u7535\u4e3b\u64ad\u8bf4","count":1},{"name":"\u6e56\u5dde\u5728\u7ebf","count":1}];
const total = 58;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
</html>
