const data = [{"name":"\u5357\u65b9\u90fd\u5e02\u62a5","count":2},{"name":"\u9f50\u9c81\u58f9\u70b9","count":2},{"name":"\u9876\u7aef\u65b0\u95fb","count":2},{"name":"\u65b0\u6d6a\u79d1\u6280","count":2},{"name":"\u91cd\u5e86\u6668\u62a5","count":2},{"name":"\u672a\u6765\u7f51","count":2},{"name":"\u5934\u6761\u535a\u5ba2","count":2},{"name":"\u76f4\u64ad\u5427","count":2},{"name":"\u5357\u90fd\u5468\u520a","count":1},{"name":"\u5927\u516c\u7f51","count":1},{"name":"\u67e5\u751f\u610f","count":1},{"name":"\u9910\u5b9d\u5178","count":1},{"name":"\u71c3\u65b0\u95fb","count":1},{"name":"\u7b77\u73a9\u601d\u7ef4","count":1},{"name":"\u4e03\u73af\u89c6\u9891","count":1},{"name":"IB\u8d44\u8baf","count":1},{"name":"\u6f47\u6e58\u6668\u62a5\u7f51","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc","count":1},{"name":"\u53c8\u5435\u5565\u5462\u4f60\u4eec","count":1},{"name":"\u6eda\u52a8\u64ad\u62a5","count":1},{"name":"\u5927\u6c5f\u65b0\u95fb","count":1},{"name":"\u4f01\u67e5\u67e5","count":1},{"name":"\u996e\u54c1\u62a5","count":1},{"name":"AI\u900f\u89c6\u955c","count":1},{"name":"\u6e38\u4fa0\u7f51","count":1},{"name":"\u5171\u5bcc\u8d22\u7ecf","count":1},{"name":"\u7ecf\u89c6\u76f4\u64ad","count":1},{"name":"\u7ea2\u9910\u7f51","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u5357\u90fd\u9274\u5b9a","count":1},{"name":"\u65f6\u5c1a\u6c7d\u8f66E\u7ebf","count":1},{"name":"\u5c01\u9762\u65b0\u95fb","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":1},{"name":"\u8d22\u7ecf\u7f51","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u641e\u7b11\u56e7\u56fe\u699c","count":1},{"name":"\u65f6\u5c1a\u6f6e\u6d41\u6c7d\u8f66","count":1},{"name":"\u5173\u4e8e\u6c7d\u8f66\u90a3\u4e9b\u4e8b\u513f","count":1},{"name":"\u5168\u7403\u70ed\u95e8\u8bdd\u9898\u6392\u884c","count":1},{"name":"\u5168\u7403IT\u6570\u7801\u6392\u884c\u699c","count":1},{"name":"Vista\u770b\u5929\u4e0b","count":1},{"name":"\u5357\u65b9\u65e5\u62a5","count":1},{"name":"\u6 const total = 60;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
</body>
