<script>
const data = [{"name":"\u641c\u72d0\u7f51","count":6},{"name":"\u730e\u5947\u7f51","count":2},{"name":"\u4e92\u8054\u7f51\u7684\u4e00\u4e9b\u4e8b","count":1},{"name":"\u5251\u5ba2\u7f51","count":1},{"name":"\u817e\u8baf\u7f51","count":1},{"name":"\u8d77\u98ce\u8d22\u7ecf","count":1},{"name":"\u8001\u864e\u793e\u533a","count":1},{"name":"\u9541\u5ba2\u7f51","count":1},{"name":"\u9c9c\u95fb\u5feb\u8baf","count":1},{"name":"\u9541\u5ba2maker\u7f51","count":1},{"name":"\u5c0f\u6ce2\u70b9","count":1},{"name":"\u79d1\u6280\u5feb\u62a5\u7f51","count":1},{"name":"\u8d22\u89c6\u4f20\u5a92","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"\u4e1c\u65b9\u5934\u6761","count":1},{"name":"\u6df1\u5733\u70ed\u7ebf","count":1},{"name":"\u4e2d\u56fd\u6295\u8d44\u54a8\u8be2\u7f51","count":1},{"name":"\u7535\u7f06\u7f51","count":1},{"name":"\u839e\u8baf\u7f51","count":1},{"name":"\u8d85\u7ea7\u73a9\u5bb6","count":1},{"name":"IT\u5546\u4e1a\u79d1\u6280\u7f51","count":1},{"name":"\u84dd\u70b9\u7f51","count":1},{"name":"Donews","count":1},{"name":"99\u79d1\u6280","count":1},{"name":"IT\u4e4b\u5bb6","count":1},{"name":"DoNews","count":1},{"name":"cnBeta","count":1},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":1},{"name":"\u79d1\u6280\u8baf","count":1},{"name":"\u6167\u806a\u7f51","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u4e2d\u56fd\u5bb6\u7535\u7f51","count":1},{"name":"\u65b0\u6d6a\u7f51","count":1},{"name":"\u673a\u623f360","count":1},{"name":"Tonesa","count":1},{"name":"\u5514\u54e9\u5934\u6761","count":1},{"name":"C114\u901a\u4fe1\u7f51","count":1},{"name":"\u8bfa\u54c8\u7f51","count":1},{"name":"\u5b89\u6eaa\u4fe1\u606f\u6e2f","count":1},{"name":"\u4e91\u5357\u6c11\u65cf\u65b0\u95fb","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u8d24\u96c6\u7f51","count":1}];
const total = 50;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
