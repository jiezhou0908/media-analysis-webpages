const data = [{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":2},{"name":"\u738b\u5c0f\u4e1c","count":2},{"name":"\u8001\u9a6c\u90a3\u4e9b\u4e8b","count":2},{"name":"\u86cb\u86cb\u8d5e","count":2},{"name":"\u65b0\u6d6a\u7f51","count":2},{"name":"\u6c47\u901a\u7f51","count":1},{"name":"\u6d31\u6d77\u7f51","count":1},{"name":"\u4e2d\u5173\u6751\u5728\u7ebf\u5ba2\u6237\u7aef","count":1},{"name":"ZOL\u4e2d\u5173\u6751\u5728\u7ebf","count":1},{"name":"\u4e2d\u56fd\u7535\u5b50\u94f6\u884c\u7f51","count":1},{"name":"\u79fb\u52a8\u652f\u4ed8\u7f51","count":1},{"name":"\u4eca\u65e5\u4e2d\u56fd\u8d22\u7ecf","count":1},{"name":"\u4e2d\u56fd\u5916\u8d38\u7f51","count":1},{"name":"\u9f50\u9c81\u665a\u62a5\u7f51","count":1},{"name":"\u5927\u6cb3\u62a5\u7f51","count":1},{"name":"\u65b0\u6d6a\u8d22\u7ecf","count":1},{"name":"\u6210\u90fd\u623f\u5929\u4e0b","count":1},{"name":"\u534a\u5c9b\u65b0\u95fb","count":1},{"name":"VC\u90e8\u843d","count":1},{"name":"\u6df1\u5733\u70ed\u7ebf","count":1},{"name":"\u6c34\u6728\u793e\u533a","count":1},{"name":"\u6469\u8bc3\u822c\u82e5\u6ce2\u7f85\u871c","count":1},{"name":"DIGITIMES","count":1},{"name":"\u5927\u4f17\u65b0\u95fb\u7f51","count":1},{"name":"\u864e\u6251\u7f51","count":1},{"name":"BTCETH","count":1},{"name":"\u4e2d\u91d1\u5728\u7ebf","count":1},{"name":"\u548c\u8baf\u7f51","count":1},{"name":"\u534a\u5c9b\u7f51","count":1},{"name":"\u695a\u5929\u90fd\u5e02\u62a5","count":1},{"name":"\u6768\u5efa\u56fd","count":1},{"name":"\u65b0\u6d6a\u79d1\u6280","count":1},{"name":"\u91d1\u7f8a\u7f51","count":1},{"name":"\u4faf\u5b81","count":1},{"name":"\u90fd\u5e02\u5feb\u62a5","count":1},{"name":"i\u9ed1\u9a6c","count":1},{"name":"\u6570\u5b57\u5c3e\u5df4","count":1},{"name":"\u56fd\u9645\u5728\u7ebf","count":1},{"name":"\u4e2d\u56fd\u7f51","count":1},{"name":"\u73af\u7403\u7f51","count":1},{"name":"\u7f51\u6613\u65b0\u95fb","count":1},{"name":"\u5927\u4f17\u7f51","count":1},{"name":"\u65b0\u6c11\u7f51","count":1},{"name":"\u592e\u5e7f\u const total = 61;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
