const data = [{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb","count":5},{"name":"\u521b\u4e1a\u90a6","count":4},{"name":"\u65b0\u6d6a\u7f51","count":3},{"name":"\u4e2d\u534e\u7f51","count":3},{"name":"\u4e2d\u56fd\u5c0f\u5eb7\u7f51","count":2},{"name":"\u5b9e\u51b5\u7f51","count":2},{"name":"\u9e7f\u79d1\u6280","count":2},{"name":"\u548c\u8baf\u7f51","count":2},{"name":"\u4e2d\u56fd\u7f51","count":2},{"name":"\u7ad9\u957f\u4e4b\u5bb6","count":2},{"name":"\u5df4\u4e2d\u5728\u7ebf","count":2},{"name":"\u4fdd\u9669\u5feb\u62a5\u7f51","count":1},{"name":"\u5e02\u573a\u8d44\u8baf","count":1},{"name":"\u8d22\u5bcc","count":1},{"name":"\u7ecf\u6d4e\u65b0\u95fb\u7f51","count":1},{"name":"\u82b1\u751f\u7c73\u7684\u5f71\u89c6","count":1},{"name":"\u5357\u65b9\u90fd\u5e02\u62a5APP \u2022 \u5357\u90fd\u5a31\u4e50","count":1},{"name":"\u79d1\u6280\u4e16\u754c\u7f51","count":1},{"name":"\u5965\u4e00\u7f51","count":1},{"name":"\u5357\u592a\u6e56\u53f7\u7efc\u5408","count":1},{"name":"\u6620\u8c61\u7f51","count":1},{"name":"\u5927\u6d2a\u5927\u4f19","count":1},{"name":"\u8d22\u7ecf\u65b0\u5a92\u4f53","count":1},{"name":"\u65f6\u95f4\u8d22\u7ecf","count":1},{"name":"\u5f53\u4ee3\u8d22\u7ecf\u7f51","count":1},{"name":"\u6df1\u6e2f\u5728\u7ebf","count":1},{"name":"\u597d\u623f\u7f51","count":1},{"name":"\u738b\u62cc\u4ed9","count":1},{"name":"\u9e7f\u8d22\u7ecf","count":1},{"name":"BiaNews\u97ad\u725b\u58eb","count":1},{"name":"Tonesa","count":1},{"name":"\u4e9a\u8bbe\u7f51","count":1},{"name":"\u9a71\u52a8\u4e4b\u5bb6","count":1},{"name":"\u4e8e\u6d77\u9752","count":1},{"name":"\u8bc1\u5238\u65f6\u62a5\u7f51","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u7f51","count":1},{"name":"\u6bcf\u65e5\u7ecf\u6d4e\u65b0\u95fb\u7f51","count":1},{"name":"ZAKER\u65b0\u95fb\u5ba2\u6237\u7aef","count":1},{"name":"\u6d77\u62a5\u65b0\u95fb","count":1},{"name":"\u4e1c\u65b9\u8d22\u5bcc\u7f51","count":1},{"name":"\u540c\u82b1\u987a","count":1},{"name":"\u5317\u4eac\u5546\u62a5","count":1},{"name":"\u5317\u4eac\u5546\u62a5\u7f51","count":1},{"name":"\u534e\u8baf\u7f51","count":1},{"name":"\u6f8e\u62dc\u65b0\u95fb","count":1},{"name":"\u4e2d\u9752\u770b\u70b9","count":1},{"name":"\u57a3\u6770","count":1},{"name":"\u7b19\u6b4c\u9189\u68a6","count":1},{"name":"\u8fb0\u51b7\u65f6\u95f4","count":1},{"name":"\u5feb\u79d1\u6280","count":1},{"name":"\u767e\u5ea6\u65b0\u95fb","count":1},{"name":"\u89c2\u5bdf\u8005\u7f51","count":1}];
const total = 70;
let chart;

// ✅ 多色渐变配色（和你截图一致）
const colorPalette = [
    '#ffce56','#8dd3c7','#bebada','#fb8072','#80b1d3','#fdb462','#b3de69','#fccde5','#d9d9d9','#bc80bd',
    '#ccebc5','#ffed6f','#a6cee3','#1f78b4','#b2df8a','#33a02c','#fb9a99','#e31a1c','#fdbf6f','#ff7f00',
    '#cab2d6','#6a3d9a','#ffff99','#b15928'
];

function refresh(topN=20){
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    let labels = [], counts = [];
    if(topN===0){ labels=['其他(全部)']; counts=[total]; }
    else{
        const show = data.slice(0,topN);
        show.forEach(i=>{labels.push(i.name);counts.push(i.count);});
        const rest = data.slice(topN);
        if(rest.length>0){ labels.push(`其他(${rest.length}家)`); counts.push(rest.reduce((s,i)=>s+i.count,0)); }
    }
    const pct = counts.map(v=>((v/total)*100).toFixed(2));

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:labels.reverse(),
            datasets:[{
                label:'占比 (%)',
                data:pct.reverse(),
                // ✅ 每个柱子用不同颜色
                backgroundColor: colorPalette.slice(0, labels.length),
                borderWidth:0
            }]
        },
        options:{
            indexAxis:'y',
            maintainAspectRatio:false,
            plugins:{
                legend:{position:'top'},
                datalabels:{
                    color:'#333',anchor:'end',align:'start',
                    formatter:v=>v+'%',font:{size:11}
                }
            },
            scales:{x:{beginAtZero:true,max:100}},
            layout:{padding:{right:40}}
        },
        plugins:[{
            beforeInit:c=>{
                if(!Chart.registry.plugins.get('d')) Chart.register({
                    id:'d',afterDatasetsDraw:ch=>{
                        const ctx=ch.ctx;
                        ch.data.datasets.forEach((ds,i)=>{
                            const m=ch.getDatasetMeta(i);
                            m.data.forEach((b,j)=>{
                                const v=ds.data[j];
                                ctx.save();
                                ctx.fillStyle='#333';
                                ctx.font='11px Microsoft YaHei';
                                ctx.textAlign='left';
                                ctx.textBaseline='middle';
                                ctx.fillText(v+'%',b.x+5,b.y);
                                ctx.restore();
                            });
                        });
                    }
                });
            }
        }]
    });
}
document.addEventListener('DOMContentLoaded',()=>refresh(20));
</script>
