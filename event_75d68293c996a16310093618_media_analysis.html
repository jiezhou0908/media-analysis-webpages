            function initChart(topN) {
                const ctx = document.getElementById('mediaChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                let labels = [];
                let data = [];

                if (topN === 0) {
                    labels = ['其他媒体（共' + uniqueMedia + '家）'];
                    data = [totalReports];
                } else {
                    const topMedia = mediaData.slice(0, topN);
                    topMedia.forEach(item => {
                        labels.push(item.name);
                        data.push(item.count);
                    });
                    const otherMedia = mediaData.slice(topN);
                    if (otherMedia.length > 0) {
                        const otherCount = otherMedia.reduce((sum, item) => sum + item.count, 0);
                        labels.push('其他媒体（共' + otherMedia.length + '家）');
                        data.push(otherCount);
                    }
                }

                const percentages = data.map(c => ((c / totalReports) * 100).toFixed(2));

                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.reverse(), // 保持和原图表一致的顺序
                        datasets: [{
                            label: '报道占比 (%)',
                            data: percentages.reverse(),
                            backgroundColor: colorPalette.slice(0, labels.length),
                            borderColor: 'white',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        indexAxis: 'y', // 横向柱状图
                        maintainAspectRatio: false, // 允许自定义高度
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: '事件ID: ' + eventId + '  媒体来源占比分析 (总报道: ' + totalReports + '篇, 不同媒体来源个数: ' + uniqueMedia + '家)',
                                font: { size: 16, weight: 'normal' },
                                padding: { top: 10, bottom: 20 }
                            },
                            legend: {
                                display: true,
                                position: 'top'
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.raw + '%';
                                    }
                                }
                            },
                            // 在柱子右侧标注百分比
                            datalabels: {
                                color: '#333',
                                anchor: 'end',
                                align: 'start',
                                formatter: function(value) {
                                    return value + '%';
                                },
                                font: { size: 11 }
                            }
                        },
                        scales: {
                            x: {
                                beginAtZero: true,
                                max: 100,
                                title: { display: true, text: '占比 (%)', font: { size: 13 } },
                                ticks: { font: { size: 11 } }
                            },
                            y: {
                                title: { display: false },
                                ticks: { font: { size: 11 } }
                            }
                        },
                        layout: {
                            padding: { left: 20, right: 40, top: 20, bottom: 20 }
                        }
                    },
                    plugins: [{
                        beforeInit: function(chart) {
                            // 注册 datalabels 插件
                            if (!Chart.registry.plugins.get('datalabels')) {
                                Chart.register({
                                    id: 'datalabels',
                                    afterDatasetsDraw: function(chart) {
                                        const ctx = chart.ctx;
                                        chart.data.datasets.forEach((dataset, datasetIndex) => {
                                            const meta = chart.getDatasetMeta(datasetIndex);
                                            meta.data.forEach((bar, index) => {
                                                const data = dataset.data[index];
                                                ctx.save();
                                                ctx.fillStyle = '#333';
                                                ctx.font = '11px Microsoft YaHei';
                                                ctx.textAlign = 'left';
                                                ctx.textBaseline = 'middle';
                                                const x = bar.x + 5;
                                                const y = bar.y;
                                                ctx.fillText(data + '%', x, y);
                                                ctx.restore();
                                            });
                                        });
                                    }
                                });
                            }
                        }
                    }]
                });
            }

            document.addEventListener('DOMContentLoaded', function() {
                const defaultTopN = 20;
                initChart(defaultTopN);
            });

            document.getElementById('mediaCountSelect').addEventListener('change', function() {
                initChart(parseInt(this.value));
            });

            document.addEventListener('keydown', function(e) {
                const select = document.getElementById('mediaCountSelect');
                if (e.key === 'ArrowUp' && parseInt(select.value) < 50) {
                    select.value = parseInt(select.value) + 1;
                    initChart(parseInt(select.value));
                } else if (e.key === 'ArrowDown' && parseInt(select.value) > 0) {
                    select.value = parseInt(select.value) - 1;
                    initChart(parseInt(select.value));
                }
            });
